      explain:tr("1=C 表示这首歌的 1(do) 落在 C；换首歌可能 1=G、1=F，所以先看谱头。","1=C means this song's 1 is C; always check the header.")}
    : {kind:"choice",concept,qtype:tr("读调号","Key"),
      prompt:tr("这首歌 <b>1=C</b>。那么简谱里的 <b>5</b> 唱作哪个音名？","If 1=C, what letter is jianpu 5?"),
      options:shuffle([{label:"G (sol)",correct:true},{label:"C (do)",correct:false},{label:"E (mi)",correct:false},{label:"A (la)",correct:false}]),
      explain:tr("C 调音阶 1=C 2=D 3=E 4=F 5=G……所以 5=G。","In C, 5 = G.")};
  }
  if(concept==="meter"){ const a=Math.random()<0.5;
    return a? {kind:"choice",concept,qtype:tr("读拍号","Meter"),
      prompt:tr("谱头 <b>4/4</b>，每小节有几拍？","Header 4/4 — beats per bar?"),
      options:shuffle([2,3,4,6].map(x=>({label:tr(x+" 拍",x+" beats"),correct:x===4}))),
      explain:tr("4/4：每小节 4 拍。数第②句 6 5 3 5 正好 4 个音。","4/4 = 4 beats per bar.")}
    : {kind:"choice",concept,qtype:tr("读拍号","Meter"),
      prompt:tr("<b>4/4</b> 里，以几分音符当作「一拍」？","In 4/4, which note value is one beat?"),
      options:shuffle([{label:tr("四分音符","quarter note"),correct:true},{label:tr("二分音符","half note"),correct:false},{label:tr("八分音符","eighth note"),correct:false},{label:tr("全音符","whole note"),correct:false}]),
      explain:tr("4/4 下面的 4 = 以四分音符为一拍；上面的 4 = 每小节 4 拍。","Lower 4 = quarter-note beat.")};
  }
  if(concept==="accent"){ const v=rand(["pattern","which3","whichnote","note3"]);
    if(v==="pattern") return {kind:"choice",concept,qtype:tr("强弱规律","Accents"),
      prompt:tr("这首是 <b>4/4</b>。每小节的强弱规律是？","4/4 — the strong/weak pattern per bar?"),
      options:shuffle([{label:tr("强 弱 次强 弱","Strong-weak-Medium-weak"),correct:true},{label:tr("强 弱 弱","Strong-weak-weak"),correct:false},{label:tr("强 弱","Strong-weak"),correct:false},{label:tr("每拍一样强","all beats equal"),correct:false}]),
      explain:tr("4/4：第 1 拍强、第 2 拍弱、第 3 拍次强、第 4 拍弱。","4/4 = strong, weak, medium, weak.")};
    if(v==="which3") return {kind:"choice",concept,qtype:tr("强弱规律","Accents"),
      prompt:tr("<b>4/4</b> 里，哪一拍是「次强」？","In 4/4, which beat is the medium accent?"),
      options:shuffle([{label:tr("第 3 拍","beat 3"),correct:true},{label:tr("第 1 拍","beat 1"),correct:false},{label:tr("第 2 拍","beat 2"),correct:false},{label:tr("第 4 拍","beat 4"),correct:false}]),
      explain:tr("4/4 第 3 拍是「次强」：比第 1 拍(最强)弱一点，但比第 2、4 拍强。","Beat 3 = the medium accent.")};
    if(v==="whichnote") return {kind:"choice",concept,qtype:tr("强弱规律","Accents"),
      prompt:tr("第①句 <b>3 3 5 6</b>（一音一拍）。落在「最强拍（第 1 拍）」上的是哪个音？","In 3 3 5 6 (one note per beat), which note is on the strongest beat?"),
      options:shuffle([{label:tr("第 1 个音 3","1st note 3"),correct:true},{label:tr("第 2 个音 3","2nd note 3"),correct:false},{label:tr("第 3 个音 5","3rd note 5"),correct:false},{label:tr("第 4 个音 6","4th note 6"),correct:false}]),
      explain:tr("每小节第 1 拍最强，开头的 3 就落在最强拍上。","Beat 1 (the 1st note) is strongest.")};
    return {kind:"choice",concept,qtype:tr("强弱规律","Accents"),
      prompt:tr("第①句 <b>3 3 5 6</b> 中，落在「次强拍（第 3 拍）」上的是哪个音？","Which note sits on the medium-accent beat (3) in 3 3 5 6?"),
      options:shuffle([{label:tr("第 3 个音 5","3rd note 5"),correct:true},{label:tr("第 1 个音 3","1st note 3"),correct:false},{label:tr("第 2 个音 3","2nd note 3"),correct:false},{label:tr("第 4 个音 6","4th note 6"),correct:false}]),
      explain:tr("4/4 第 3 拍是次强，对应第 3 个音 5。","Beat 3 = medium accent → the 3rd note 5.")};
  }
  if(concept==="first"){ const a=Math.random()<0.5; const ph=a?"①":"②"; const num=a?"3":"6"; const corr=a?"E (mi)":"A (la)";
    return {kind:"choice",concept,qtype:tr("读首音","First note"),
      prompt:tr("看第"+ph+"句开头，第一个音是 <b>"+num+"</b>。它在 C 调里的音名是？","First note of phrase "+ph+" is "+num+" — its letter in C?"),
      options:shuffle([{label:corr,correct:true},...shuffle(["C (do)","D (re)","E (mi)","G (sol)","A (la)"].filter(x=>x!==corr)).slice(0,3).map(x=>({label:x,correct:false}))]),
      explain:tr("C 调里：1=C 2=D 3=E 5=G 6=A。这个音是 "+corr+"。","In C: 1=C 2=D 3=E 5=G 6=A.")};
  }
  if(concept==="value"){ const v=rand([["第④句 <b>1 - - -</b>（1 后面三条增时线，共 4 拍）","whole","全音符","whole note"],["第②句 <b>6 -</b>（6 加一条增时线，共 2 拍）","half","二分音符","half note"],["第②句单独的 <b>5</b>（不带横线，唱 1 拍）","quarter","四分音符","quarter note"]]);
    return {kind:"choice",concept,qtype:tr("读时值","Note value"),
      prompt:tr(v[0]+" 相当于几分音符？","What note value is "+v[3]+"-length here?"),
      options:shuffle([{label:tr("全音符（4 拍）","whole (4)"),correct:v[1]==="whole"},{label:tr("二分音符（2 拍）","half (2)"),correct:v[1]==="half"},{label:tr("四分音符（1 拍）","quarter (1)"),correct:v[1]==="quarter"},{label:tr("八分音符（半拍）","eighth (½)"),correct:false}]),
      explain:tr("4/4 里：1 拍=四分音符，2 拍=二分音符，4 拍=全音符，半拍=八分音符。","In 4/4: 1=quarter, 2=half, 4=whole, ½=eighth.")};
  }
  if(concept==="symbol"){ const k=rand(["zero","dash","up","down"]);
    if(k==="zero") return {kind:"choice",concept,qtype:tr("读记号·0","Sign · 0"),
      prompt:tr("第②句 <b>6 - 0 5</b> 里的 <b>0</b> 表示什么？","In 6 - 0 5, what is the 0?"),
      options:shuffle([{label:tr("休止——不发声，正好换气","a rest — silence / breath"),correct:true},{label:tr("唱一个 do","sing do"),correct:false},{label:tr("把前音延长","hold previous"),correct:false},{label:tr("一个很低的音","a low note"),correct:false}]),
      explain:tr("0 = 休止符，不发声。","0 = rest, no sound.")};
    if(k==="dash") return {kind:"choice",concept,qtype:tr("读记号·-","Sign · -"),
      prompt:tr("第②句 <b>6 - 0 5</b> 里 6 后面的 <b>-</b> 表示什么？","What does the dash after 6 mean?"),
      options:shuffle([{label:tr("把前面的 6 延长一拍（不重唱）","hold the 6 one more beat"),correct:true},{label:tr("再唱一次 6","sing 6 again"),correct:false},{label:tr("休止不唱","a rest"),correct:false},{label:tr("升高半音","up a semitone"),correct:false}]),
      explain:tr("「-」是增时线：延长前一个音。6 - = 6 唱两拍、只发一次声。","Dash extends the previous note.")};
    if(k==="up") return {kind:"choice",concept,qtype:tr("读记号·八度","Sign · octave"),
      prompt:tr("第①句的 <b>1^</b>（数字上面有点）和普通的 1 比，怎样？","1 with a dot above vs plain 1?"),
      options:shuffle([{label:tr("高一个八度","an octave higher"),correct:true},{label:tr("一样高","same"),correct:false},{label:tr("低一个八度","an octave lower"),correct:false},{label:tr("升半音","a semitone up"),correct:false}]),
      explain:tr("数字上加点 = 高八度。","Dot above = octave up.")};
    return {kind:"choice",concept,qtype:tr("读记号·八度","Sign · octave"),
      prompt:tr("第④句的 <b>5_ 6_</b>（数字下面有点）在什么音区？","5_ 6_ (dot below) — which register?"),
      options:shuffle([{label:tr("低八度——比普通 5 6 更低","an octave lower"),correct:true},{label:tr("高八度","higher"),correct:false},{label:tr("一样高","same"),correct:false},{label:tr("是休止","rests"),correct:false}]),
      explain:tr("数字下加点 = 低八度，唱得更低。","Dot below = octave lower.")};
  }
  if(concept==="interval"){ const p=rand([["3","5","三度","a 3rd"],["5","6","二度","a 2nd"],["6","1^","三度","a 3rd"]]);
    return {kind:"choice",concept,qtype:tr("读音程","Interval"),
      prompt:tr("谱中相邻两音 <b>"+p[0]+" → "+p[1]+"</b> 之间是几度？","Interval from "+p[0]+" to "+p[1]+"?"),
      options:shuffle([{label:tr("二度","2nd"),correct:p[2]==="二度"},{label:tr("三度","3rd"),correct:p[2]==="三度"},{label:tr("四度","4th"),correct:false},{label:tr("五度","5th"),correct:false}]),
      explain:tr("数度数把两个音都数进去：3→5 数 3、4、5 = 三度；5→6 = 二度。","Count both ends: 3-4-5 = 3rd; 5-6 = 2nd.")};
  }
  if(concept==="shape"){ const up=Math.random()<0.5;
    return {kind:"choice",concept,qtype:tr("读走向","Contour"),
      prompt:up?tr("第③句前半 <b>3 5 6 1^</b> 的走向是？","3 5 6 1^ goes…?"):tr("第③句后半 <b>6 5 3 2</b> 的走向是？","6 5 3 2 goes…?"),
      options:shuffle([{label:tr("上行（越来越高）","ascending"),correct:up},{label:tr("下行（越来越低）","descending"),correct:!up},{label:tr("原地不动","flat"),correct:false}]),
      explain:up?tr("3→5→6→1^ 一路往上 = 上行。","Going up."):tr("6→5→3→2 一路往下 = 下行。","Going down.")};
  }
  if(concept==="range"){ const hi=Math.random()<0.5;
    return {kind:"choice",concept,qtype:tr("读音区","Range"),
      prompt:hi?tr("整段里<b>最高</b>的音是哪个？","The highest note in the score?"):tr("整段里<b>最低</b>的音是哪个？","The lowest note in the score?"),
      options:shuffle([{label:tr("高音 1^（高八度 do）","high 1^"),correct:hi},{label:tr("低音 5_（低八度 sol）","low 5_"),correct:!hi},{label:tr("6（la）","6"),correct:false},{label:tr("3（mi）","3"),correct:false}]),
      explain:tr("最高 = 第①③句的 1^（高八度）；最低 = 第④句的 5_（低八度）。","Highest = 1^; lowest = 5_.")};
  }
  const rep=Math.random()<0.5;
  if(rep) return {kind:"choice",concept,qtype:tr("反复","Repeat"),
    prompt:tr("第①句两端有 <b>𝄆 … 𝄇</b>，这一句要怎么唱？","Phrase ① is inside 𝄆 … 𝄇 — how do you sing it?"),
    options:shuffle([{label:tr("连着唱两遍","sing it twice"),correct:true},{label:tr("只唱一遍","once"),correct:false},{label:tr("跳过不唱","skip it"),correct:false},{label:tr("只唱一半","half of it"),correct:false}]),
    explain:tr("𝄆 𝄇 之间的内容要唱两遍。","Repeat marks = sing twice.")};
  return {kind:"choice",concept,qtype:tr("终止感","Ending"),
    prompt:tr("整首落在第④句的 <b>1 - - -</b>（1 延长四拍）。这种结尾给人的感觉是？","Ends on 1 held four beats — the feeling?"),
    options:shuffle([{label:tr("到家了、说完了（稳）","home / finished"),correct:true},{label:tr("没说完、想继续","unfinished, wants more"),correct:false},{label:tr("很紧张","tense"),correct:false},{label:tr("听不出调","atonal"),correct:false}]),
    explain:tr("落在 1(do) 最稳 = 到家感；若停在 5 就像话没说完。","Ending on 1 = home; on 5 = open.")};
};

renderHome();
</script>
</body>
</html>
