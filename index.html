<style>
  :root{
    --bg:#1a1530; --bg2:#241c45; --card:#2d2356; --card2:#372a68;
    --ink:#f4f0ff; --muted:#b3a8d9; --line:#473a7d;
    --p1:#ff7a59; --p2:#ffcf5c; --p3:#5ce6c0; --p4:#7aa7ff; --p5:#c98bff;
    --ok:#5ce6a0; --bad:#ff6b8a; --white:#fffdf7; --black:#2a2350;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 80% -10%, #33276b 0%, var(--bg) 55%), var(--bg);
    color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:920px;margin:0 auto;padding:18px 16px 120px}
  .topbar{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:.5px}
  .brand .logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--p1),var(--p5));font-size:18px}
  .xp{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    padding:7px 12px;border-radius:999px;font-weight:700;font-size:14px}
  .xp .star{color:var(--p2)}
  .hint{color:var(--muted);font-size:13px}
  .hero{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:20px;padding:20px 22px;margin-bottom:18px}
  .hero h1{margin:0 0 6px;font-size:24px}
  .hero p{margin:0;color:var(--muted);line-height:1.6;font-size:14px}
  .domain{font-size:13px;font-weight:800;color:var(--p3);letter-spacing:.5px;margin:18px 2px 10px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .lvl{position:relative;text-align:left;border:1px solid var(--line);border-radius:18px;
    padding:16px 16px 14px;cursor:pointer;color:var(--ink);overflow:hidden;
    background:var(--card);transition:transform .12s ease, box-shadow .12s ease;}
  .lvl:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.35)}
  .lvl[disabled]{cursor:not-allowed;opacity:.5;filter:grayscale(.4)}
  .lvl .num{font-size:28px;line-height:1}
  .lvl h3{margin:8px 0 4px;font-size:16px}
  .lvl .desc{color:var(--muted);font-size:12.5px;line-height:1.5;min-height:34px}
  .lvl .bar{margin-top:10px;height:8px;border-radius:99px;background:#00000030;overflow:hidden}
  .lvl .bar > i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--p3),var(--p4));transition:width .4s}
  .lvl .meta{display:flex;justify-content:space-between;align-items:center;margin-top:7px;font-size:11.5px;color:var(--muted)}
  .lvl .lock,.lvl .done{position:absolute;top:13px;right:14px;font-size:18px}
  .lvl .done{color:var(--p3)}
  .accent{position:absolute;inset:0 auto 0 0;width:6px}
  .back{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:6px 0;margin-bottom:6px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;margin-bottom:16px}
  .panel h2{margin:0 0 4px;font-size:20px}
  .teach{line-height:1.7;font-size:14.5px;color:#e9e3ff}
  .teach b{color:var(--p2)}
  .teach .en{color:var(--p4);font-style:normal;font-size:.92em}
  .teach .row{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);
    border-radius:12px;padding:9px 13px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--ink);transition:.12s}
  .chip:hover{border-color:var(--p4);transform:translateY(-1px)}
  details.note{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
  details.note summary{cursor:pointer;color:var(--p4);font-weight:600;font-size:13.5px}
  details.xopen>summary{color:var(--p2)}
  details.note[data-tag] summary::after{content:attr(data-tag);font-size:11px;color:var(--muted);font-weight:600;margin-left:8px}
  .qhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .qhead .prog{flex:1;height:10px;border-radius:99px;background:#00000035;overflow:hidden}
  .qhead .prog > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--p2),var(--p1));transition:width .4s}
  .qhead .cnt{font-size:13px;color:var(--muted);white-space:nowrap}
  .qtype{font-size:12px;color:var(--p3);font-weight:700;letter-spacing:1px}
  .qprompt{font-size:18px;font-weight:700;margin:6px 0 14px;line-height:1.5}
  .playbtn{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--p1),var(--p5));
    color:#fff;border:none;border-radius:14px;padding:13px 22px;font-size:15px;font-weight:800;cursor:pointer;
    box-shadow:0 8px 20px rgba(255,122,89,.3)}
  .playbtn:active{transform:scale(.97)}
  .playbtn.small{padding:9px 14px;font-size:13.5px;background:var(--card2);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
  .opts{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-top:16px}
  @media(max-width:520px){.opts{grid-template-columns:1fr}}
  .opt{text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:14px;
    padding:13px 15px;cursor:pointer;font-size:14.5px;font-weight:600;color:var(--ink);transition:.12s}
  .opt:hover{border-color:var(--p4)}
  .opt .sub{display:none;color:var(--muted);font-size:12px;font-weight:500;margin-top:3px}
  .opts.revealsubs .opt .sub{display:block}
  .opt.correct{border-color:var(--ok);background:#1c4a3a}
  .opt.wrong{border-color:var(--bad);background:#4a1c2c}
  .opt[disabled]{cursor:default}
  .feedback{margin-top:14px;border-radius:14px;padding:13px 16px;font-size:14px;line-height:1.6;display:none}
  .feedback.show{display:block}
  .feedback.good{background:#16402f;border:1px solid var(--ok)}
  .feedback.bad{background:#421a28;border:1px solid var(--bad)}
  .feedback .t{font-weight:800;margin-bottom:3px}
  .next{display:none;margin-top:14px}
  .next.show{display:inline-flex}
  .buildbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}
  .submitb{background:linear-gradient(135deg,var(--p3),var(--p4));color:#16213a;border:none;border-radius:13px;
    padding:11px 20px;font-weight:800;font-size:14px;cursor:pointer}
  .clearb{background:var(--card2);border:1px solid var(--line);color:var(--muted);border-radius:13px;padding:11px 16px;cursor:pointer;font-size:13px}
  .selnotes{color:var(--muted);font-size:13px}
  .sortwrap{margin-top:14px}
  .sortslots{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;background:var(--bg2);border:1px dashed var(--line);border-radius:12px;padding:10px}
  .sortpool{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .tok{background:var(--card2);border:1.5px solid var(--line);border-radius:11px;padding:9px 14px;font-weight:800;font-size:15px;cursor:pointer}
  .tok:hover{border-color:var(--p4)}
  .tok.inslot{background:linear-gradient(135deg,var(--p4),var(--p5));color:#fff;border-color:transparent}
  .pianowrap{position:relative;margin-top:16px;background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:14px}
  .pianowrap .lbl{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .piano{position:relative;height:150px;display:flex;user-select:none;touch-action:manipulation}
  .key{position:relative;flex:1;border:1px solid #0d0a1f;border-radius:0 0 7px 7px;cursor:pointer}
  .key.w{background:linear-gradient(180deg,#fffef9,#efe9df);z-index:1}
  .key.w:active,.key.w.lit{background:linear-gradient(180deg,#ffe7a8,#ffcf5c)}
  .key.w.sel{background:linear-gradient(180deg,#a8f0d8,#5ce6c0)}
  .key.w.reveal{background:linear-gradient(180deg,#d6b3ff,#c98bff)!important;box-shadow:0 0 16px 3px #c98bff inset}
  .key.b{position:absolute;top:0;width:6.2%;height:62%;background:linear-gradient(180deg,#3a3360,#1c1838);
    z-index:2;border-radius:0 0 6px 6px;border:1px solid #000}
  .key.b:active,.key.b.lit{background:linear-gradient(180deg,#ffb86b,#ff7a59)}
  .key.b.sel{background:linear-gradient(180deg,#52d6b4,#37b896)}
  .key.b.reveal{background:linear-gradient(180deg,#a86bff,#7a3aff)!important;box-shadow:0 0 14px 2px #a86bff}
  .key .nm{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;color:#564c7a;pointer-events:none}
  .key.b .nm{color:#cfc6ef;font-size:9px;bottom:5px}
  .key .sf{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:10px;font-weight:800;color:#9a5;pointer-events:none}
  .key.b .sf{color:#ffd;font-size:9px;bottom:16px}
  .minipw{margin-top:12px;padding:10px}
  .piano.mini{height:104px}
  .staffbox{background:#fffdf7;border-radius:14px;padding:10px 6px;margin:12px 0;overflow-x:auto}
  .contourbox{display:flex;align-items:flex-end;gap:6px;height:90px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;margin:12px 0}
  .cnote{flex:1;background:linear-gradient(180deg,var(--p4),var(--p5));border-radius:6px 6px 0 0;min-height:8px;transition:height .3s}
  .bpmrow{display:flex;align-items:center;gap:12px;margin:12px 0;flex-wrap:wrap}
  .bpmrow input[type=range]{flex:1;min-width:160px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(40px);
    background:var(--card2);border:1px solid var(--p3);color:var(--ink);padding:13px 20px;border-radius:14px;
    font-weight:700;opacity:0;transition:.3s;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .confetti{position:fixed;width:10px;height:14px;top:-20px;z-index:60;border-radius:2px;pointer-events:none}
  .traincard{margin-top:14px;display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#3a2a66,#4a2f7a);
    border:1px solid var(--line);border-radius:18px;padding:16px 18px;cursor:pointer;width:100%;text-align:left;color:var(--ink);transition:.12s}
  .traincard:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.32)}
  .traincard .big{font-size:34px}
  .traincard h3{margin:0 0 3px;font-size:17px}
  .traincard .desc{color:var(--muted);font-size:12.5px;line-height:1.5}
  .seg{display:inline-flex;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
  .seg button{border:none;background:none;color:var(--muted);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
  .seg button.on{background:linear-gradient(135deg,var(--p4),var(--p5));color:#fff}
  .pickgrid{display:flex;flex-wrap:wrap;gap:9px;margin:10px 0}
  .pick{border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:12px;padding:11px 15px;font-size:13.5px;font-weight:700;cursor:pointer}
  .pick:hover{border-color:var(--p4)}
  .pick.on{border-color:var(--p3);background:#23463f}
  .repbig{font-size:46px;font-weight:900;margin:6px 0 2px;background:linear-gradient(135deg,var(--p3),var(--p4));-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center}
  .reprow{display:flex;align-items:center;gap:10px;margin:9px 0}
  .reprow .rn{width:90px;font-weight:700;font-size:13.5px}
  .reprow .rbar{flex:1;height:14px;border-radius:99px;background:#00000035;overflow:hidden}
  .reprow .rbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p3),var(--p4));transition:width .5s}
  .reprow.weak .rbar>i{background:linear-gradient(90deg,var(--bad),var(--p1))}
  .reprow .rp{width:64px;text-align:right;font-size:12.5px;color:var(--muted)}
  .micbox{margin-top:10px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px}
  .miccanvas{width:100%;height:120px;background:#150f2e;border-radius:10px;display:block;margin-top:8px}
  .micnote{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6}
  #kbDock{position:fixed;left:0;right:0;bottom:0;z-index:40;display:none;padding:8px 12px 10px;
    background:linear-gradient(180deg, rgba(26,21,48,0), var(--bg) 38%)}
  #kbDock .pianowrap{max-width:920px;margin:0 auto;box-shadow:0 -12px 34px rgba(0,0,0,.55);padding:10px}
  #kbDock .piano{height:92px}
  body.hasdock .wrap{padding-bottom:200px}
  @media(max-width:640px){#kbDock .piano{height:80px} body.hasdock .wrap{padding-bottom:172px}}
  .langbar{position:fixed;top:10px;right:12px;z-index:999;display:flex;gap:4px}
.backmap{position:fixed;top:10px;left:12px;z-index:1000;display:none;align-items:center;gap:5px;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:20px;padding:7px 13px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.4)}
.backmap:hover{background:var(--line)}

  .langbar button{background:#241f44;border:1px solid #3a3360;color:#8f86b8;font-weight:800;font-size:12px;padding:5px 10px;border-radius:8px;cursor:pointer}

<script>
/* ============================================================

const NOTE_NAMES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

const CHORDS={ maj:{cn:"大三和弦",en:"major",iv:[0,4,7],jian:"1 3 5",feel:"明亮、稳定"},
               min:{cn:"小三和弦",en:"minor",iv:[0,3,7],jian:"1 ♭3 5",feel:"柔和、忧郁"} };
const KEYSIGS={ C:{root:0,sharps:[],flats:[],cn:"C 大调",note:"全是白键"},
                G:{root:7,sharps:["F"],flats:[],cn:"G 大调",note:"1 个升号 F♯"},
                F:{root:5,sharps:[],flats:["B"],cn:"F 大调",note:"1 个降号 B♭"} };
function sharp(s){return(""+s).replace(/#/g,"♯");}
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------------- 音频 (Tone.js) ---------------- */
let synth=null, kick=null, snare=null, hat=null, reverb=null, audioReady=false;
function makeSources(){
  if(!reverb) reverb=new Tone.Reverb({decay:1.6,wet:0.18}).toDestination();
  synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},
    envelope:{attack:0.01,decay:0.16,sustain:0.82,release:0.28}}).connect(reverb);
  synth.volume.value=-10;
  kick=new Tone.MembraneSynth({pitchDecay:0.03,octaves:5,oscillator:{type:"sine"},
    envelope:{attack:0.001,decay:0.26,sustain:0,release:0.02}}).toDestination();
  kick.volume.value=4;
  const _snHP=new Tone.Filter(1100,"highpass").toDestination();
  snare=new Tone.NoiseSynth({noise:{type:"white"},envelope:{attack:0.001,decay:0.13,sustain:0}}).connect(_snHP);
  snare.volume.value=6.5;
  const _haHP=new Tone.Filter(8000,"highpass").toDestination();
  hat=new Tone.NoiseSynth({noise:{type:"white"},envelope:{attack:0.001,decay:0.035,sustain:0}}).connect(_haHP);
  hat.volume.value=6;
}
async function initAudio(){ if(audioReady) return; try{ await Tone.start(); }catch(e){} makeSources(); audioReady=true; }
let _justStopped=false, _tlTimers=[];
function _tlStop(){ _tlTimers.forEach(clearTimeout); _tlTimers=[];
  document.querySelectorAll(".tlcell.act").forEach(c=>c.classList.remove("act"));
  document.querySelectorAll(".tlphead").forEach(ph=>{ ph.style.transition="none"; ph.style.left="0%"; }); document.querySelectorAll(".tl.open").forEach(t=>t.classList.remove("open")); }
let _playTimers=[];
function _stopPlay(){ _playTimers.forEach(clearTimeout); _playTimers=[]; try{ if(synth&&synth.releaseAll) synth.releaseAll(); }catch(e){} }
function stopAll(){ if(_justStopped) return; _justStopped=true; setTimeout(function(){_justStopped=false;},0);
  clearLights(); _tlStop(); _stopPlay(); }
function midiToName(m){ return NOTE_NAMES[((m%12)+12)%12]+(Math.floor(m/12)-1); }
function semiName(semi,base=60){ return midiToName(base+semi); }
function durToMs(d){ return {"16n":160,"8n":340,"4n":620,"2n":1100,"1n":2000}[d]||500; }
let _lightT=[], LIGHT_ON=true;
function clearLights(){ _lightT.forEach(clearTimeout); _lightT=[]; document.querySelectorAll('.key.reveal').forEach(k=>k.classList.remove('reveal')); }
function lightKey(m,on){ document.querySelectorAll('.key[data-midi="'+m+'"]').forEach(k=>k.classList.toggle('reveal',on)); }
function lightAlong(events){ if(!LIGHT_ON) return; clearLights();
  events.forEach(ev=>{ _lightT.push(setTimeout(()=>ev.midis.forEach(m=>lightKey(m,true)), ev.at));
    _lightT.push(setTimeout(()=>ev.midis.forEach(m=>lightKey(m,false)), ev.at+ev.dur)); });
}
async function playMidis(midis,dur="8n",arp=false,gap=0.34){
  stopAll(); await initAudio(); const dm=durToMs(dur);
  if(arp){ midis.forEach((m,i)=>{ const nm=midiToName(m); _playTimers.push(setTimeout(()=>{try{synth.triggerAttackRelease(nm,dur);}catch(e){}}, i*gap*1000)); });
    lightAlong(midis.map((m,i)=>({midis:[m],at:i*gap*1000,dur:Math.max(dm,gap*900)}))); }
  else{ const names=midis.map(midiToName); _playTimers.push(setTimeout(()=>{try{synth.triggerAttackRelease(names,dur);}catch(e){}},0)); lightAlong([{midis,at:0,dur:dm+700}]); }
}
async function playSemis(semis,base=60,arp=false,dur="8n",gap=0.34){
  await playMidis(semis.map(s=>base+s),dur,arp,gap);
}
async function playMelody(seq,bpm=96){ // seq:[{m:midi|null, b:beats}]
  stopAll(); await initAudio(); const spb=60/bpm; let ms=40; const ev=[];
  for(const n of seq){ const d=n.b*spb*0.95;
    if(n.m!=null){ const nm=midiToName(n.m), vv=(n.v!=null?n.v:0.8); _playTimers.push(setTimeout(()=>{try{synth.triggerAttackRelease(nm,d,undefined,vv);}catch(e){}}, ms)); ev.push({midis:[n.m],at:ms,dur:n.b*spb*900}); }
    ms+=n.b*spb*1000; }
  lightAlong(ev);
  return seq.reduce((s,n)=>s+n.b,0)*spb;
}
function drumFor(i,period,offset){ const p=(((i-(offset||0))%period)+period)%period;
  if(period===4) return p===0?"kick":p===2?"snare":"hat";
  if(period===6) return p===0?"kick":p===3?"snare":"hat";
  if(period===2) return p===0?"kick":"hat";
  return p===0?"kick":"hat"; }
function hitDrum(d){ try{
  if(d==="kick") kick.triggerAttackRelease("C2","8n",undefined,1);
  else if(d==="snare") snare.triggerAttackRelease("16n",undefined,0.9);
  else hat.triggerAttackRelease("32n",undefined,0.6);
}catch(e){} }
async function playBeat(bpm=96,beats=4,accent=true,period=0,offset=0){
  stopAll(); await initAudio(); const spb=60/bpm, per=period>0?period:(beats||4);
  for(let i=0;i<beats;i++){ const d=drumFor(i,per,offset); _playTimers.push(setTimeout(()=>hitDrum(d), i*spb*1000)); }
}

/* 渲染从 lo..hi(含)的 MIDI 区间。mode:"play"|"build" ; sel:已选 midi 集合 */
function pianoHTML(lo,hi,opt={}){
  const showNames=opt.showNames!==false, showSolf=!!opt.showSolfege;
  const BLACK=[1,3,6,8,10];
  // 白键列表（用于黑键定位）
  let whites=[]; for(let m=lo;m<=hi;m++){ if(!BLACK.includes(m%12)) whites.push(m); }
  const wpct=100/whites.length;
  let html=`<div class="piano" data-lo="${lo}" data-hi="${hi}">`;
  // 白键
  whites.forEach(m=>{ const pc=m%12; const nm=NOTE_NAMES[pc]+(Math.floor(m/12)-1);
    const sf=showSolf?SOLFEGE[pc]:"";
    html+=`<div class="key w" data-midi="${m}" data-pc="${pc}">${sf?`<span class="sf">${sf}</span>`:""}${showNames?`<span class="nm">${nm}</span>`:""}</div>`; });
  // 黑键（绝对定位骑在白键缝上）：宽≈白键的60%(物理钢琴比例)，并按 2/3 分组向组外侧微偏 —— 照搬样本
  const BK_SHIFT={1:-0.12,3:0.12,6:-0.15,8:0,10:0.15};
  let wIdx=0;
  for(let m=lo;m<=hi;m++){ const pc=m%12;
    if(BLACK.includes(pc)){
      const left=wIdx*wpct - wpct*0.30 + BK_SHIFT[pc]*wpct;
      html+=`<div class="key b" data-midi="${m}" data-pc="${pc}" style="left:${left}%;width:${wpct*0.60}%">${showNames?`<span class="nm">${sharp(NOTE_NAMES[pc])}</span>`:""}</div>`;
    } else { wIdx++; }
  }
  html+=`</div>`;
  return html;
}
function bindPiano(root,opt={}){
  root.querySelectorAll(".key").forEach(k=>{
    k.onclick=()=>{ const m=+k.dataset.midi;
      if(opt.mode==="build"){ k.classList.toggle("sel"); opt.onselect&&opt.onselect(); }
      playMidis([m],"8n"); k.classList.add("lit"); setTimeout(()=>k.classList.remove("lit"),220);

}
function selectedMidis(root){ return [...root.querySelectorAll(".key.sel")].map(k=>+k.dataset.midi); }
function revealKeys(root,midis){ root.querySelectorAll(".key").forEach(k=>{

/* ---------------- 简谱渲染（方案B：CSS 定位圆点 + 双下划线减时线） ---------------- */
const JP_DEG=[0,0,2,4,5,7,9,11]; // 简谱 1..7 -> 大调半音（index 0 占位）
function jpNote(n,oct,acc,durU,dot){
  let dots="";
  if(oct>0) for(let i=0;i<oct&&i<2;i++) dots+=`<i class="o u${i+1}"></i>`;
  else if(oct<0) for(let i=0;i<-oct&&i<2;i++) dots+=`<i class="o d${i+1}"></i>`;
  const a=acc?`<span class="jpacc">${acc==="#"?"♯":acc==="b"?"♭":acc}</span>`:"";
  let lines=""; if(durU===1) lines='<i class="ln l1"></i>'; else if(durU===2) lines='<i class="ln l1"></i><i class="ln l2"></i>';
  const cls="jp"+(oct>0?" pu":"")+(oct<0||durU>0?" pd":"");
  const dt=dot?'<span class="jpdot">·</span>':"";
  return `<span class="${cls}">${a}<span class="jpn">${n}${dt}${dots}${lines}</span></span>`;
}
/* 紧凑串： 1–7 音；前缀 #/b 升降；后缀 ^ 高八度(可叠) _ 低八度；"/e"=八分(下1线) "/s"=十六分(下2线)；- 延音线；0 休止；| 小节线
   例： "1 2 3/e 4/e 5 - | 5_ 1 0 3^" */
function jpParse(str){ const out=[]; (str||"").trim().split(/\s+/).forEach(tok=>{
  if(!tok) return;
  if(tok==="|"){ out.push({bar:1}); return; }
  if(tok==="-"){ out.push({dash:1}); return; }
  let dot=false; if(tok.length>1&&tok.endsWith(".")){ dot=true; tok=tok.slice(0,-1); }
  let dur=0; const sl=tok.indexOf("/");
  if(sl>=0){ const d=tok.slice(sl+1); dur=d==="s"?2:d==="e"?1:0; tok=tok.slice(0,sl); }
  let acc=""; while(tok[0]==="#"||tok[0]==="b"){ acc=tok[0]; tok=tok.slice(1); }
  const n=+tok[0]; let oct=0;
  for(let i=1;i<tok.length;i++){ if(tok[i]==="^")oct++; else if(tok[i]==="_")oct--; }
  out.push({n,oct,acc,dur,dot}); }); return out; }
function jpHTML(str,opt={}){ const __H=`<span class="jpseq">`+jpParse(str).map(t=>
  t.bar?`<span class="jpbar">|</span>`:
  t.dash?`<span class="jpdash">–</span>`:
  (t.n===0?`<span class="jp">0</span>`:jpNote(t.n,t.oct,t.acc,t.dur,t.dot))).join("")+`</span>`;
  if(opt.raw) return __H;
  const b=opt.b||0.5,bpm=opt.bpm||110,base=opt.base||60;
  return `<span class="jpsay" data-jp="${str}" data-b="${b}" data-bpm="${bpm}" data-base="${base}" title="${tr("点击试听","tap to hear")}">${__H}</span>`; }
function jpMidis(str,base=60){ const m=[]; jpParse(str).forEach(t=>{ if(t.bar||t.dash) return;
  if(t.n===0){ m.push(null); return; }
  m.push(base+JP_DEG[t.n]+12*t.oct+(t.acc==="#"?1:t.acc==="b"?-1:0)); }); return m; }
function jpSeq(str,base,baseB){ base=base||60; baseB=(baseB||0.5); const out=[];
  jpParse(str).forEach(t=>{ if(t.bar) return;
    if(t.dash){ if(out.length) out[out.length-1].b+=1; return; } // 延音线=加满一整拍，听得清
    out.push({ m: t.n===0?null : base+JP_DEG[t.n]+12*t.oct+(t.acc==="#"?1:t.acc==="b"?-1:0), b: baseB*(t.dot?1.5:1) }); });
  return out; }
/* 简谱小卡片：🔊 可点播放 + 同时显示简谱 */
function jpChip(str,opt={}){ const b=opt.b||0.5,bpm=opt.bpm||110,base=opt.base||60,label=opt.label||"";
  return `<span class="chip jpc" data-jp="${str}" data-b="${b}" data-bpm="${bpm}" data-base="${base}">🔊 ${label?label+" ":""}${jpHTML(str,{raw:true})}</span>`; }

/* ---------------- 麦克风音准镜子（折叠层，宽容反馈） ---------------- */
let micState=null;
function micMirrorHTML(targetMidi){
  return `<div class="micbox" data-mic="${targetMidi}">
    <div class="bpmrow"><button class="playbtn small" id="micTarget">🔊 ${tr("听目标音","Target")}</button>
      <button class="playbtn small" id="micStart">🎤 ${tr("开始跟唱","Start")}</button>
      <button class="chip" id="micStop">${tr("停止","Stop")}</button></div>
    <canvas class="miccanvas" id="micCv"></canvas>
    <div class="micnote">${tr("提示：建议戴耳机，安静环境。这只是「练习镜子」，给参考反馈，不计分、不影响通关。",
      "Tip: use headphones in a quiet room. This is a practice mirror — reference feedback only, never scored.")}</div></div>`;
}
function bindMicMirror(root,targetMidi){
  const cv=root.querySelector("#micCv"); const ctx=cv&&cv.getContext("2d");
  function resize(){ if(!cv) return; cv.width=cv.clientWidth*2; cv.height=240; }
  setTimeout(resize,50);
  root.querySelector("#micTarget").onclick=()=>playMidis([targetMidi],"2n");
  root.querySelector("#micStop").onclick=()=>stopMic();
  root.querySelector("#micStart").onclick=async()=>{
    if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){ toast(tr("此环境不支持麦克风","Mic not available here")); return; }
    if(!(location.protocol==="https:"||location.hostname==="localhost"||location.protocol==="file:")){ toast(tr("需在 https 或本地打开才能用麦克风","Needs https/localhost for mic")); }
    try{
      await initAudio();
      const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
      const ac=Tone.getContext().rawContext; const src=ac.createMediaStreamSource(stream);
      const an=ac.createAnalyser(); an.fftSize=2048; src.connect(an);
      const buf=new Float32Array(an.fftSize); micState={stream,an,buf,raf:0};
      const targetHz=440*Math.pow(2,(targetMidi-69)/12);
      function draw(){ an.getFloatTimeDomainData(buf);
        const hz=autoCorrelate(buf,ac.sampleRate);
        ctx.clearRect(0,0,cv.width,cv.height);
        const midY=120, span=240; // ±1 八度映射
        // 目标条
        ctx.fillStyle="#3a2f6e"; ctx.fillRect(0,midY-12,cv.width,24);
        ctx.fillStyle="#ffd96b"; ctx.font="16px sans-serif"; ctx.fillText(tr("目标","target")+" "+midiToName(targetMidi),8,midY-18);
        if(hz>0){ const cents=1200*Math.log2(hz/targetHz);
          const y=midY-(cents/1200)*(span/2);
          let col= Math.abs(cents)<=50?"#5ce6a0":Math.abs(cents)<=100?"#ffcf5c":"#ff6b8a";
          ctx.fillStyle=col; ctx.beginPath(); ctx.arc(cv.width/2,Math.max(10,Math.min(230,y)),12,0,7); ctx.fill();
          ctx.fillStyle="#f4f0ff"; ctx.font="15px sans-serif";
          ctx.fillText((cents>0?"+":"")+Math.round(cents)+"¢ "+(Math.abs(cents)<=50?tr("很准👍","on pitch"):cents>0?tr("略高","sharp"):tr("略低","flat")),cv.width/2+20,Math.max(20,Math.min(232,y)));
        } else { ctx.fillStyle="#6b6090"; ctx.font="15px sans-serif"; ctx.fillText(tr("（没听到声音，唱出来试试）","(no voice detected — sing!)"),cv.width/2-90,midY+50); }
        micState.raf=requestAnimationFrame(draw); }
      draw();
    }catch(e){ toast(tr("无法访问麦克风","Cannot access mic")); const note=root.querySelector(".micnote"); if(note) note.innerHTML='<b style="color:var(--bad)">'+tr("麦克风被拒绝或不可用。请在浏览器地址栏左侧允许麦克风权限，并用 https/本地服务器打开；手机请用浏览器而非内置预览。","Mic blocked/unavailable. Allow mic permission in the address bar and open via https/localhost.")+'</b>'; }
  };
}
function stopMic(){ if(!micState) return; cancelAnimationFrame(micState.raf);
  try{ micState.stream.getTracks().forEach(t=>t.stop()); }catch(e){} micState=null; }
function autoCorrelate(buf,sr){ // 经典自相关测基频；无声/噪声返回 -1
  let rms=0; for(let i=0;i<buf.length;i++) rms+=buf[i]*buf[i]; rms=Math.sqrt(rms/buf.length);
  if(rms<0.012) return -1;
  let r1=0,r2=buf.length-1,th=0.2;
  for(let i=0;i<buf.length/2;i++){ if(Math.abs(buf[i])<th){r1=i;break;} }
  for(let i=1;i<buf.length/2;i++){ if(Math.abs(buf[buf.length-i])<th){r2=buf.length-i;break;} }
  const b=buf.slice(r1,r2); const c=new Array(b.length).fill(0);
  for(let lag=0;lag<b.length;lag++) for(let i=0;i<b.length-lag;i++) c[lag]+=b[i]*b[i+lag];
  let d=0; while(c[d]>c[d+1]) d++;
  let maxv=-1,maxp=-1; for(let i=d;i<b.length;i++){ if(c[i]>maxv){maxv=c[i];maxp=i;} }
  if(maxp<=0) return -1; const hz=sr/maxp;
  return (hz>60&&hz<1200)?hz:-1;
}

function jpText(s){ return (s==null?"":(""+s)).replace(/<[^>]*>|[1-7][_^]+/g,function(m){return m.charAt(0)==="<"?m:jpHTML(m,{raw:true});}); }
function qSig(q){ if(!q) return ""; return [q.kind,q.qtype,q.prompt,JSON.stringify(q.options?q.options.map(o=>o.label).slice().sort():(q.target||q.answer||q.contour||""))].join("|"); }
function buildQueue(id,weak){ const m=modById(id),mas=masteryOf(id); let cs=m.concepts; if(weak){ cs=m.concepts.filter(c=>(mas[c]||0)<MASTERY_TARGET); if(!cs.length) cs=m.concepts; } return shuffle(cs.concat(cs).map(c=>({concept:c}))); } // 每概念两题：一轮内各答对两次即标绿通关 // 每概念一题，一轮内不重复
function genUnique(gen,concept){ for(let i=0;i<16;i++){ const c=gen?gen(concept,state.lang):null; if(!c) return null; const s=qSig(c); if(!state.seen||!state.seen.has(s)||i===15){ state.seen&&state.seen.add(s); return c; } } return null; }
function startQuestions(id,weak){ state.flow="level"; state.qList=buildQueue(id,weak); state.qIdx=0; state.seen=new Set(); state.screen="question"; nextQuestion(); }
function nextQuestion(){
  if(state.qIdx>=state.qList.length){ return renderModuleDone(state.moduleId); }
  const slot=state.qList[state.qIdx]; const gen=QGEN[state.moduleId];
  state.q = genUnique(gen,slot.concept);
  if(!state.q){ state.qIdx++; return nextQuestion(); }
  renderQuestion();
}
function renderQuestion(){
  const q=state.q, m=modById(state.moduleId);
  showDock(true); LIGHT_ON=(q.kind!=="build"); clearLights();
  const total=state.qList.length, idx=state.qIdx+1;
  let body="";
  if(q.kind==="choice"||q.kind==="ear"){
    body=`<div class="opts" id="opts">${q.options.map((o,i)=>`<button class="opt" data-i="${i}">${jpText(o.label)}${o.sub?`<span class="sub">${jpText(o.sub)}</span>`:""}</button>`).join("")}</div>`;
  } else if(q.kind==="build"){
    body=`<div class="pianowrap"><div class="lbl"><span>${tr("点亮你的答案，然后提交","Select keys, then submit")}</span></div>
      ${pianoHTML(q.lo||60,q.hi||72,{showNames:false,showSolfege:false})}</div>
      <div class="buildbar"><button class="submitb" id="submitB">${tr("提交","Submit")}</button>
      <button class="clearb" id="clearB">${tr("清空","Clear")}</button><span class="selnotes" id="selNotes"></span></div>`;
  } else if(q.kind==="sort"){
    body=`<div class="sortwrap"><div class="sortslots" id="slots"></div>
      <div class="sortpool" id="pool">${shuffle(q.items.map((t,i)=>({t,i}))).map(o=>`<button class="tok" data-t="${o.t}">${o.t}</button>`).join("")}</div>
      <div class="buildbar"><button class="submitb" id="submitS">${tr("提交","Submit")}</button>
      <button class="clearb" id="clearS">${tr("清空","Clear")}</button></div></div>`;
  }
  (toTop(),syncBackMap(),app()).innerHTML=`
    <button class="back" id="back">← ${tr("返回讲解","Lesson")}</button>
    <div class="panel">
      ${state.moduleId==="detective"?(`<div style="margin:0 0 12px"><div style="font-size:12px;color:var(--muted);margin-bottom:5px">`+tr("参考谱 · 做题时一直显示","Reference score · stays on screen")+`</div>`+detectiveScoreHTML()+`</div>`):""}<div class="qhead"><span class="qtype">${q.qtype||tr("小题","Quiz")}</span>
        <div class="prog"><i style="width:${Math.round((state.qIdx)/total*100)}%"></i></div>
        <span class="cnt">${idx}/${total}</span></div>
      <div class="qprompt">${jpText(q.prompt)}</div>
      ${q.play?`<button class="playbtn" id="playBtn">🔊 ${q.playLabel||tr("播放","Play")}</button>`:""}
      ${q.contour?contourHTML(q.contour):""}
      ${body}
      <div class="feedback" id="fb"></div>
      <button class="playbtn next" id="nextBtn">${tr("下一题 →","Next →")}</button>
    </div>`;
  const root=app(); bindPlayables(root);
  root.querySelector("#back").onclick=()=>renderLesson();
  if(q.play) root.querySelector("#playBtn").onclick=()=>q.play();
  if(q.autoplay&&q.play) setTimeout(()=>q.play(),250);
  if(q.kind==="choice"||q.kind==="ear"){
    root.querySelectorAll(".opt").forEach(b=>b.onclick=()=>chooseOpt(+b.dataset.i));
  } else if(q.kind==="build"){
    const pw=root.querySelector(".pianowrap"); bindPiano(pw,{mode:"build",onselect:()=>{
      root.querySelector("#selNotes").textContent=selectedMidis(pw).map(midiToName).join(" "); }});
    root.querySelector("#clearB").onclick=()=>{ pw.querySelectorAll(".key.sel").forEach(k=>k.classList.remove("sel")); root.querySelector("#selNotes").textContent=""; };
    root.querySelector("#submitB").onclick=()=>submitBuild(pw);
  } else if(q.kind==="sort"){
    bindSort(root);
  }
}
function contourHTML(midis){ const lo=Math.min(...midis),hi=Math.max(...midis),sp=Math.max(hi-lo,1);
  return `<div class="contourbox">${midis.map(m=>`<div class="cnote" style="height:${20+(m-lo)/sp*60}px"></div>`).join("")}</div>`; }
function bindSort(root){ const slots=root.querySelector("#slots"), pool=root.querySelector("#pool");
  pool.querySelectorAll(".tok").forEach(t=>t.onclick=()=>{ t.classList.add("inslot"); slots.appendChild(t);
    t.onclick=()=>{ t.classList.remove("inslot"); pool.appendChild(t); rebind(); }; });
  function rebind(){ pool.querySelectorAll(".tok").forEach(t=>t.onclick=()=>{ t.classList.add("inslot"); slots.appendChild(t);
    t.onclick=()=>{ t.classList.remove("inslot"); pool.appendChild(t); rebind(); }; }); }
  root.querySelector("#clearS").onclick=()=>{ slots.querySelectorAll(".tok").forEach(t=>{t.classList.remove("inslot");pool.appendChild(t);}); rebind(); };
  root.querySelector("#submitS").onclick=()=>{ const got=[...slots.querySelectorAll(".tok")].map(t=>t.dataset.t);
    judge(JSON.stringify(got)===JSON.stringify(state.q.answer)); };
}
function chooseOpt(i){ const q=state.q; const opts=app().querySelector("#opts"); opts.classList.add("revealsubs");
  opts.querySelectorAll(".opt").forEach((b,j)=>{ b.disabled=true;
    if(q.options[j].correct) b.classList.add("correct"); if(j===i&&!q.options[j].correct) b.classList.add("wrong"); });
  judge(!!q.options[i].correct);
}
function submitBuild(pw){ const got=selectedMidis(pw).map(x=>x%12).sort((a,b)=>a-b);
  const want=[...new Set(state.q.target.map(x=>x%12))].sort((a,b)=>a-b);
  judge(JSON.stringify(got)===JSON.stringify(want));
  if(state.q.target) revealKeys(pw,state.q.target);
}
function judge(correct){ const q=state.q;
  const fb=app().querySelector("#fb"); fb.classList.add("show",correct?"good":"bad");
  fb.innerHTML=`<div class="t">${correct?tr("✓ 答对了！","✓ Correct!"):tr("✗ 再想想","✗ Not quite")}</div>${jpText(q.explain||"")}`;
  const mas=masteryOf(state.moduleId);
  if(correct){ mas[q.concept]=(mas[q.concept]||0)+1; state.xp+=10; if(state.xp%50<10) {} }
  else { mas[q.concept]=0; state.xp+=2; }
  save();
  const nb=app().querySelector("#nextBtn"); if(nb){ nb.classList.add("show"); nb.onclick=()=>{ state.qIdx++; nextQuestion(); }; }
}
function renderModuleDone(id){ state.screen="done"; showDock(false); clearLights(); const m=modById(id); const done=moduleComplete(id);
  const i=modIndex(id), nextM=MODULES[i+1];
  if(done) confetti();
  (toTop(),syncBackMap(),app()).innerHTML=`<div class="panel" style="text-align:center">
    <div style="font-size:54px">${done?"🎉":"💪"}</div>
    <h2>${done?tr("通关！","Level cleared!"):tr("这一轮结束","Round done")}</h2>
    <p class="teach">${done?tr("你已掌握「"+m.t[0]+"」的全部要点。","You mastered "+m.t[1]+"."):tr("还有概念没掌握——「再练没掌握的」只考还没答对两次的，练到全部过关。","Practice just the ones not yet correct twice, until all pass.")}</p>
    <div class="buildbar" style="justify-content:center">
      <button class="playbtn" id="again">${done?tr("再练一轮","Again"):tr("再练没掌握的","Practice the misses")}</button>
      ${done&&nextM&&isUnlocked(nextM.id)?`<button class="playbtn" id="goNext">${tr("下一关 →","Next →")}</button>`:""}
      <button class="chip" id="home">${tr("返回地图","Map")}</button></div></div>`;
  app().querySelector("#again").onclick=()=>startQuestions(id,!done);
  app().querySelector("#home").onclick=renderHome;
  const gn=app().querySelector("#goNext"); if(gn) gn.onclick=()=>openModule(nextM.id);
}

/* ============================================================
   训练场（练习/测试 + 报告）
   ============================================================ */
function renderTraining(){ state.screen="train"; showDock(false);
  const implemented=MODULES.filter(m=>QGEN[m.id]);
  (toTop(),syncBackMap(),app()).innerHTML=`<button class="back" id="back">← ${tr("返回地图","Map")}</button>
    <div class="panel"><h2>🎯 ${tr("训练场","Training")}</h2>
    <p class="teach">${tr("选范围与模式，混合出题。选「测试」+「全部」就是综合测验（15 题，≥80% 通过）。","Pick scope & mode. Test + All = the comprehensive test (15 Qs, ≥80%).")}</p>
    <div class="seg" id="modeSeg"><button data-m="practice" class="on">${tr("练习(带提示+解释)","Practice")}</button><button data-m="test">${tr("测试(出报告)","Test")}</button></div>
    <div class="pickgrid" id="catPick">
      <button class="pick on" data-c="all">${tr("全部","All")}</button>
      <button class="pick" data-c="d1">${tr("音高与记谱","Pitch")}</button>
      <button class="pick" data-c="d2">${tr("节奏","Rhythm")}</button>
      <button class="pick" data-c="d3">${tr("表情与综合","Expression")}</button>
    </div>
    <div class="buildbar"><button class="playbtn" id="go">${tr("开始 →","Go →")}</button></div>
    <p class="hint" style="margin-top:10px">${tr("已实现题库："+implemented.length+" 关","Question banks: "+implemented.length+" levels")}</p></div>`;
  app().querySelector("#back").onclick=renderHome;
  let mode="practice",cat="all";
  app().querySelectorAll("#modeSeg button").forEach(b=>b.onclick=()=>{ mode=b.dataset.m;
    app().querySelectorAll("#modeSeg button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); });
  app().querySelectorAll("#catPick .pick").forEach(b=>b.onclick=()=>{ cat=b.dataset.c;
    app().querySelectorAll("#catPick .pick").forEach(x=>x.classList.remove("on")); b.classList.add("on"); });
  app().querySelector("#go").onclick=()=>startTraining(mode,cat);
}
function startTraining(mode,cat){
  const pool=MODULES.filter(m=>QGEN[m.id]).filter(m=>cat==="all"||("d"+m.domain)===cat);
  if(!pool.length){ toast(tr("该范围题库还在编写","Bank coming soon")); return; }
  const q=[]; pool.forEach(m=>m.concepts.forEach(c=>q.push({id:m.id,concept:c})));
  const isFinal=(mode==="test"&&cat==="all"); state.train={mode,cat,log:[],queue:shuffle(q).slice(0,Math.min(isFinal?15:12,q.length)),idx:0,final:isFinal}; state.seen=new Set();
  state.flow="train"; trainNext();
}
function trainNext(){ const T=state.train;
  if(T.idx>=T.queue.length) return trainReport();
  const slot=T.queue[T.idx]; state.moduleId=slot.id; state.q=genUnique(QGEN[slot.id],slot.concept);
  if(!state.q){ T.idx++; return trainNext(); }
  state.qList=T.queue; state.qIdx=T.idx; state.screen="question";
  renderTrainQuestion();
}
function renderTrainQuestion(){
  const q=state.q,T=state.train;
  showDock(true); LIGHT_ON=(q.kind!=="build"); clearLights();
  let body="";
  if(q.kind==="choice"||q.kind==="ear") body=`<div class="opts" id="opts">${q.options.map((o,i)=>`<button class="opt" data-i="${i}">${jpText(o.label)}${o.sub?`<span class="sub">${jpText(o.sub)}</span>`:""}</button>`).join("")}</div>`;
  else if(q.kind==="build") body=`<div class="pianowrap"><div class="lbl"><span>${tr("点亮答案","Select")}</span></div>${pianoHTML(q.lo||60,q.hi||72,{showNames:false,showSolfege:false})}</div><div class="buildbar"><button class="submitb" id="submitB">${tr("提交","Submit")}</button><button class="clearb" id="clearB">${tr("清空","Clear")}</button><span class="selnotes" id="selNotes"></span></div>`;
  else if(q.kind==="sort") body=`<div class="sortwrap"><div class="sortslots" id="slots"></div><div class="sortpool" id="pool">${shuffle(q.items.map(t=>t)).map(t=>`<button class="tok" data-t="${t}">${t}</button>`).join("")}</div><div class="buildbar"><button class="submitb" id="submitS">${tr("提交","Submit")}</button><button class="clearb" id="clearS">${tr("清空","Clear")}</button></div></div>`;
  (toTop(),syncBackMap(),app()).innerHTML=`<button class="back" id="back">← ${tr("退出训练","Exit")}</button>
    <div class="panel"><div class="qhead"><span class="qtype">${tr("训练","Train")} · ${q.qtype||""}</span>
      <div class="prog"><i style="width:${Math.round(T.idx/T.queue.length*100)}%"></i></div><span class="cnt">${T.idx+1}/${T.queue.length}</span></div>
      <div class="qprompt">${jpText(q.prompt)}</div>
      ${q.play?`<button class="playbtn" id="playBtn">🔊 ${q.playLabel||tr("播放","Play")}</button>`:""}${q.contour?contourHTML(q.contour):""}
      ${body}<div class="feedback" id="fb"></div>
      <button class="playbtn next" id="nextBtn">${tr("下一题 →","Next →")}</button></div>`;
  const root=app(); bindPlayables(root);
  root.querySelector("#back").onclick=renderTraining;
  if(q.play){ root.querySelector("#playBtn").onclick=()=>q.play(); if(q.autoplay) setTimeout(()=>q.play(),250); }
  if(q.kind==="choice"||q.kind==="ear") root.querySelectorAll(".opt").forEach(b=>b.onclick=()=>trainChoose(+b.dataset.i));
  else if(q.kind==="build"){ const pw=root.querySelector(".pianowrap"); bindPiano(pw,{mode:"build",onselect:()=>{root.querySelector("#selNotes").textContent=selectedMidis(pw).map(midiToName).join(" ");}});
    root.querySelector("#clearB").onclick=()=>{pw.querySelectorAll(".key.sel").forEach(k=>k.classList.remove("sel"));root.querySelector("#selNotes").textContent="";};
    root.querySelector("#submitB").onclick=()=>{ const got=selectedMidis(pw).map(x=>x%12).sort((a,b)=>a-b),want=[...new Set(q.target.map(x=>x%12))].sort((a,b)=>a-b); trainJudge(JSON.stringify(got)===JSON.stringify(want)); revealKeys(pw,q.target); }; }
  else if(q.kind==="sort"){ bindSortGeneric(root,()=>{ const got=[...root.querySelector("#slots").querySelectorAll(".tok")].map(t=>t.dataset.t); trainJudge(JSON.stringify(got)===JSON.stringify(q.answer)); }); }
}
function bindSortGeneric(root,onSubmit){ const slots=root.querySelector("#slots"),pool=root.querySelector("#pool");
  function wire(){ [...pool.querySelectorAll(".tok"),...slots.querySelectorAll(".tok")].forEach(t=>t.onclick=()=>{
    if(t.parentElement===pool){t.classList.add("inslot");slots.appendChild(t);}else{t.classList.remove("inslot");pool.appendChild(t);} wire(); }); }
  wire(); root.querySelector("#clearS").onclick=()=>{slots.querySelectorAll(".tok").forEach(t=>{t.classList.remove("inslot");pool.appendChild(t);});wire();};
  root.querySelector("#submitS").onclick=onSubmit;
}
function trainChoose(i){ const q=state.q,opts=app().querySelector("#opts");
  if(state.train.mode==="practice"){ opts.classList.add("revealsubs");
    opts.querySelectorAll(".opt").forEach((b,j)=>{ b.disabled=true; if(q.options[j].correct)b.classList.add("correct"); if(j===i&&!q.options[j].correct)b.classList.add("wrong"); }); }
  trainJudge(!!q.options[i].correct);
}
function trainJudge(correct){ const q=state.q,T=state.train;
  T.log.push({id:state.moduleId,domain:modById(state.moduleId).domain,correct});
  if(correct) state.xp+=8; save();
  if(T.mode==="practice"){ const fb=app().querySelector("#fb"); fb.classList.add("show",correct?"good":"bad");
    fb.innerHTML=`<div class="t">${correct?tr("✓ 正确","✓"):tr("✗ 看解释","✗")}</div>${jpText(q.explain||"")}`;
    const nb=app().querySelector("#nextBtn"); nb.classList.add("show"); nb.onclick=()=>{ T.idx++; trainNext(); }; }
  else { T.idx++; trainNext(); }
}
function trainReport(){ const T=state.train; state.screen="report"; showDock(false); clearLights();
  const byD={1:{c:0,n:0},2:{c:0,n:0},3:{c:0,n:0}};
  T.log.forEach(l=>{ byD[l.domain].n++; if(l.correct)byD[l.domain].c++; });
  const total=T.log.length, right=T.log.filter(l=>l.correct).length; const pct=total?Math.round(right/total*100):0; const passed=pct>=80; const finalBanner=T.final?(`<div style="text-align:center;font-size:42px">`+(passed?"🎓":"💪")+`</div><p class="teach" style="text-align:center;font-weight:800">`+(passed?tr("恭喜通过综合测验！","Passed!"):tr("还差一点（目标 80%）","Almost — aim 80%"))+`</p>`):"";
  function row(dn,name){ const d=byD[dn]; const pct=d.n?Math.round(d.c/d.n*100):0; const weak=d.n&&pct<60;
    return `<div class="reprow ${weak?"weak":""}"><span class="rn">${name}</span><div class="rbar"><i style="width:${pct}%"></i></div><span class="rp">${d.c}/${d.n}</span></div>`; }
  const weakest=Object.entries(byD).filter(([,d])=>d.n).sort((a,b)=>(a[1].c/a[1].n)-(b[1].c/b[1].n))[0];
  (toTop(),syncBackMap(),app()).innerHTML=`<div class="panel">${finalBanner}<div class="repbig">${pct}%</div>
    <p class="teach" style="text-align:center">${right}/${total} ${tr("正确","correct")}</p>
    ${row(1,tr("音高记谱","Pitch"))}${row(2,tr("节奏","Rhythm"))}${row(3,tr("表情综合","Expr."))}
    <p class="teach" style="margin-top:12px">${weakest?tr("建议复习：","Review: ")+tr(DOMAINS[weakest[0]][0],DOMAINS[weakest[0]][1]):""}</p>
    <div class="buildbar" style="justify-content:center"><button class="playbtn" id="again">${tr("再来","Again")}</button>${weakest?'<button class="playbtn" id="drill">'+tr("只练弱项 →","Drill weak →")+'</button>':""}<button class="chip" id="home">${tr("返回地图","Map")}</button></div></div>`;
  app().querySelector("#again").onclick=renderTraining; app().querySelector("#home").onclick=renderHome; { const db=app().querySelector("#drill"); if(db&&weakest) db.onclick=()=>startTraining("practice","d"+weakest[0]); }
}

/* ================= 互动组件：升降 Key 滑块 / 分层试听 ================= */
function keySliderHTML(jp,opt){ opt=opt||{}; const bpm=opt.bpm||110,b=opt.b||.5;
  return `<div class="keyslider" data-ksjp="${jp}" data-bpm="${bpm}" data-b="${b}">
    <div class="bpmrow"><button class="playbtn small kplay">▶ ${tr("播放","Play")}</button>
      <span style="color:var(--muted)">${tr("升降 Key","Key")}</span>
      <input type="range" class="krange" min="-5" max="7" value="0" step="1" style="flex:1;min-width:120px">
      <b class="klabel" style="color:var(--p2)">1=C</b></div>
    <div style="margin-top:8px" class="teach">${jpHTML(jp,{raw:true})}</div>
    <div class="micnote">${tr("拖动滑块只改变「1=X」（整体音高），谱面数字完全不变。","The slider changes only the key (pitch); the numbers never change.")}</div></div>`;
}
function jpTimed(jp,base){ base=(base==null?60:base); const items=[]; let pos=0;
  jpParse(jp).forEach(t=>{
    if(t.bar){ items.push({bar:pos}); return; }
    if(t.dash){ for(let k=items.length-1;k>=0;k--){ if(items[k].bar==null){ items[k].len+=1; break; } } pos+=1; return; }
    const len=(t.dur===1?0.5:t.dur===2?0.25:1)*(t.dot?1.5:1);
    const m=(t.n===0)?null:(base+JP_DEG[t.n]+12*t.oct+(t.acc==="#"?1:t.acc==="b"?-1:0));
    const jpstr=(t.n===0)?null:((t.acc==="#"?"#":t.acc==="b"?"b":"")+t.n+(t.oct>0?"^".repeat(t.oct):t.oct<0?"_".repeat(-t.oct):""));
    items.push({m,len,start:pos,jpstr}); pos+=len;
  });
  return {items,total:(pos||1)};
}
function midiToJp(m,base){ base=(base==null?60:base); let s=m-base,oct=0; while(s<0){s+=12;oct--;} while(s>11){s-=12;oct++;}
  const nat={0:"1",2:"2",4:"3",5:"4",7:"5",9:"6",11:"7"}, low={1:"1",3:"2",6:"4",8:"5",10:"6"};
  let n=nat[s],acc=""; if(!n){ n=low[s]; acc="#"; }
  return acc+n+(oct>0?"^".repeat(oct):oct<0?"_".repeat(-oct):""); }
function melTimed(mel,base){ base=(base==null?60:base); const items=[]; let pos=0;
  mel.trim().split(/\s+/).forEach(tok=>{ const a=tok.split(":"); const mm=a[0],len=+(a[1]||1),v=(a[2]!=null?+a[2]:null);
    const m=(mm==="r"||mm==="0")?null:+mm; const jpstr=(m==null)?null:midiToJp(m,base);
    items.push({m,len,start:pos,jpstr,v}); pos+=len; });
  return {items,total:(pos||1)}; }
function timelineHTML(opt){ opt=opt||{}; const drum=!!opt.drum, jp=opt.jp||"", mel=opt.mel||"", bpm=opt.bpm||100, period=opt.period||4, base=opt.base||60, tag=opt.tag||"", pickup=(+opt.pickup||0);
  let total, melHTML="", bars="", melRow="";
  if(drum){ total=opt.beats||8; }
  else { const T=mel?melTimed(mel,base):jpTimed(jp,base); total=T.total;
    T.items.forEach(it=>{
      if(it.bar!=null){ if(it.bar>0&&it.bar<total){ bars+=`<span class="tlbar" style="left:${(it.bar*100/total).toFixed(3)}%"></span>`; } return; }
      const left=(it.start*100/total).toFixed(3), w=(it.len*100/total).toFixed(3);
      if(it.m==null){ melHTML+=`<span class="tlcell tlrest" data-t="${it.start}" data-len="${it.len}" style="left:${left}%;width:${w}%"></span>`; }
      else { melHTML+=`<span class="tlcell tlnote" data-t="${it.start}" data-len="${it.len}" style="left:${left}%;width:${w}%">${jpHTML(it.jpstr,{raw:true})}</span>`; }
    });
    melRow=`<div class="tlrow"><span class="tllabel">${tr("旋律","Melody")}</span><div class="tltrack">${bars}${melHTML}</div></div>`;
  }
  let beats=""; const nb=Math.round(total);
  for(let i=0;i<nb;i++){ const dd=drumFor(i,period,pickup); const cls=dd==="kick"?" strong":dd==="snare"?" medium":""; const sym=dd==="kick"?"●":dd==="snare"?"◗":"·"; beats+=`<span class="tlcell tlbeat${cls}" data-t="${i}" data-len="1" style="left:${(i*100/total).toFixed(3)}%;width:${(100/total).toFixed(3)}%">${sym}</span>`; }
  const label=(tag?tag+" ":"")+(drum?tr("鼓点·点开演示","beat demo"):tr("旋律＋鼓点·点开演示","melody+beat demo"));
  return `<div class="tl" data-mljp="${jp}" data-mlmel="${mel}" data-drum="${drum?1:0}" data-beats="${total}" data-base="${base}" data-period="${period}" data-pickup="${pickup}" data-bpm="${bpm}">
    <button class="playbtn small tlplay">▶ ${label}</button>
    <div class="tlbody">
      ${melRow}
      <div class="tlrow"><span class="tllabel">${tr("鼓点","Beat")}</span><div class="tltrack">${bars}${beats}</div></div>
      <div class="tlover"><span class="tlphead"></span></div>
    </div></div>`;
}

function layersHTML(mel,bass,opt){ opt=(opt&&typeof opt==="object")?opt:{}; const bpm=opt.bpm||100, period=opt.period||4, base=opt.base||60;
  const M=jpTimed(mel,base), B=jpTimed(bass,base); const total=Math.max(M.total,B.total);
  const cells=(T)=>T.items.map(it=>{ if(it.bar!=null) return ""; const left=(it.start*100/total).toFixed(3), w=(it.len*100/total).toFixed(3);
    return it.m==null?`<span class="tlcell tlrest" data-t="${it.start}" data-len="${it.len}" style="left:${left}%;width:${w}%"></span>`:`<span class="tlcell tlnote" data-t="${it.start}" data-len="${it.len}" style="left:${left}%;width:${w}%">${jpHTML(it.jpstr,{raw:true})}</span>`; }).join("");
  let beats=""; const nb=Math.round(total); for(let i=0;i<nb;i++){ const dd=drumFor(i,period,0); const cls=dd==="kick"?" strong":dd==="snare"?" medium":""; const sym=dd==="kick"?"●":dd==="snare"?"◗":"·"; beats+=`<span class="tlcell tlbeat${cls}" data-t="${i}" data-len="1" style="left:${(i*100/total).toFixed(3)}%;width:${(100/total).toFixed(3)}%">${sym}</span>`; }
  const trk=(name,label,inner)=>`<div class="tlrow"><span class="tllabel"><label style="cursor:pointer;display:inline-flex;align-items:center;gap:5px"><input type="checkbox" class="lytrk" data-trk="${name}" checked> ${label}</label></span><div class="tltrack">${inner}</div></div>`;
  return `<div class="tl tl3" data-mljp="${mel}" data-mlbass="${bass}" data-drum="0" data-beats="${total}" data-base="${base}" data-period="${period}" data-pickup="0" data-bpm="${bpm}">
    <button class="playbtn small tlplay">▶ ${tr("三轨·勾选/静音任意轨·点开演示","3 tracks · toggle each · play")}</button>
    <div class="tlbody">
      ${trk("mel",tr("主旋律","Melody"),cells(M))}
      ${trk("bass",tr("贝斯","Bass"),cells(B))}
      ${trk("drum",tr("鼓点","Drums"),beats)}
      <div class="tlover"><span class="tlphead"></span></div>
    </div></div>`;
}
function bindExtras(root){
  root.querySelectorAll(".tl").forEach(w=>{ const pb=w.querySelector(".tlplay"),ph=w.querySelector(".tlphead"); if(!pb||!ph) return;
    const bpm=+(w.dataset.bpm||100),base=+(w.dataset.base||60),period=+(w.dataset.period||4),drum=w.dataset.drum==="1",mlmel=w.dataset.mlmel||"";
    const T=drum?null:(mlmel?melTimed(mlmel,base):jpTimed(w.dataset.mljp,base));
    const total=drum?(+(w.dataset.beats||8)):T.total, dur=total*60/bpm, spb=60/bpm*1000;
    pb.onclick=()=>{
      const trkOn=(nm)=>{ const cb=w.querySelector('.lytrk[data-trk="'+nm+'"]'); return !cb||cb.checked; };
      if(!drum && trkOn("mel")){ playMelody(T.items.filter(it=>it.bar==null).map(it=>({m:it.m,b:it.len,v:it.v})),bpm); }
      if(w.dataset.mlbass && trkOn("bass")){ const Bb=jpTimed(w.dataset.mlbass,base); playMelody(Bb.items.filter(it=>it.bar==null).map(it=>({m:it.m,b:it.len,v:it.v})),bpm); }
      if(trkOn("drum")){ playBeat(bpm,Math.round(total),true,period,+(w.dataset.pickup||0)); }
      w.classList.add("open");
      const cells=[...w.querySelectorAll(".tlcell")]; cells.forEach(c=>c.classList.remove("act"));
      cells.forEach(c=>{ const st=+c.dataset.t, ln=+(c.dataset.len||1); _tlTimers.push(setTimeout(()=>c.classList.add("act"),st*spb)); _tlTimers.push(setTimeout(()=>c.classList.remove("act"),(st+ln)*spb-25)); });
      ph.style.transition="none"; ph.style.left="0%"; void ph.offsetWidth; ph.style.transition="left "+dur+"s linear"; ph.style.left="100%";
      _tlTimers.push(setTimeout(()=>{ w.classList.remove("open"); }, dur*1000+1000));
    };
  });

  root.querySelectorAll(".lytrk").forEach(cb=>{ cb.onchange=()=>{ const row=cb.closest(".tlrow"); if(row) row.style.opacity=cb.checked?"":"0.4"; }; });
  root.querySelectorAll(".keyslider").forEach(w=>{ const r=w.querySelector(".krange"),lb=w.querySelector(".klabel");
    const upd=()=>{ lb.textContent="1="+sharp(NOTE_NAMES[((+r.value)%12+12)%12]); };
    const playAt=()=>playMelody(jpSeq(w.dataset.ksjp,60+(+r.value),+(w.dataset.b||.5)),+(w.dataset.bpm||110));
    if(r){ r.oninput=upd; r.onchange=playAt; upd(); }
    const pb=w.querySelector(".kplay"); if(pb) pb.onclick=playAt;
  });
  root.querySelectorAll(".layers").forEach(w=>{ const pb=w.querySelector(".lplay"); if(!pb) return;
    pb.onclick=()=>{ const on=[...w.querySelectorAll(".ly:checked")].map(c=>c.value); const bpm=+(w.dataset.bpm||100),b=+(w.dataset.b||.5);
      if(on.includes("mel")) playMelody(jpSeq(w.dataset.mel,60,b),bpm);
      if(on.includes("bass")) playMelody(jpSeq(w.dataset.bass,48,b),bpm);
      if(on.includes("drum")){ const n=jpMidis(w.dataset.mel).length; playBeat(bpm,Math.max(4,Math.round(n*b)),true); }
    };});
}

· ${tr("下面一个点 = 低八度：","Dot below = octave down: ")}${jpHTML("1_")} ${jpHTML("5_")}<br>

<div class="row">${timelineHTML({jp:"5_ 1 5 1^ | 5 1 5_ -",period:4,bpm:120,base:60,tag:tr("低5·1·5·高1","low5·1·5·high1")})}</div>

<div class="row">${timelineHTML({jp:"1 1 5 5 6 6 5",period:4,bpm:120,base:60,tag:"《小星星》"})}</div>

<p style="color:var(--muted)">${tr("⚠️ 易错：<b>0</b> 是休止(不发声)、<b>-</b> 是延长前一个音(不重唱)、数字上下的小点是<b>八度</b>(不是升降号)。","Watch out: 0 = rest, - holds the previous note, dots = octave (not accidentals).")}</p>`;
QGEN.staff=(concept,L)=>{
  const map=[["1","do","C"],["2","re","D"],["3","mi","E"],["4","fa","F"],["5","sol","G"],["6","la","A"],["7","si","B"]];
  if(concept==="num"){ const p=rand(map);
    return {kind:"choice",concept,qtype:tr("简谱↔音名","Jianpu↔name"),
      prompt:tr(`在 C 调里，简谱 <b>${p[0]}</b> 是哪个音名？`,`In the key of C, which note name is jianpu <b>${p[0]}</b>?`),
      play:()=>playMidis([60+MAJOR_SCALE[+p[0]-1]],"4n"),playLabel:tr("听这个音","Hear it"),
      options:shuffle([{label:p[2],sub:p[1],correct:true},...shuffle(map.filter(x=>x[2]!==p[2])).slice(0,3).map(x=>({label:x[2],sub:x[1],correct:false}))]),
      explain:tr(`简谱 1–7 = do–si = C–B（C 调）。${p[0]} = ${p[1]} = ${p[2]}。`,`1–7 = do–si = C–B. ${p[0]}=${p[1]}=${p[2]}.`)};
  }
  if(concept==="octdot"){ const up=Math.random()<0.5;
    return {kind:"choice",concept,qtype:tr("八度点","Octave dot"),
    prompt:up?tr(`简谱里 ${jpHTML("1^")}（数字上面一个点）表示什么？`,"A dot ABOVE a number means?"):tr(`简谱里 ${jpHTML("1_")}（数字下面一个点）表示什么？`,"A dot BELOW a number means?"),
    options:shuffle([{label:up?tr("高一个八度","one octave higher"):tr("低一个八度","one octave lower"),correct:true},
      {label:up?tr("低一个八度","one octave lower"):tr("高一个八度","one octave higher"),correct:false},
      {label:tr("升高半音","up a semitone"),correct:false},
      {label:tr("时值加倍","twice as long"),correct:false}]),
    explain:tr("上加点=高八度，下加点=低八度，点的个数=升/降几个八度。","Dot above = octave up; below = octave down; dots = how many octaves.")};
  }
  // earnum：听 1，再听一个音，判断简谱数字
  const deg=1+Math.floor(Math.random()*7);
  let opts=[deg]; while(opts.length<4){ const r=1+Math.floor(Math.random()*7); if(!opts.includes(r)) opts.push(r); }
  const sol=["","do","re","mi","fa","sol","la","si"];
  return {kind:"ear",concept,qtype:tr("听音辨简谱","Ear → number"),autoplay:true,
    prompt:tr("先听主音 1(do)，再听一个音。第二个音是简谱几？","Hear 1(do), then a note — what's its number?"),
    play:async()=>{ await playMidis([60],"4n"); setTimeout(()=>playMidis([60+MAJOR_SCALE[deg-1]],"4n"),720); },
    playLabel:tr("再放一次","Replay"),
    options:shuffle(opts).map(v=>({label:String(v),sub:sol[v],correct:v===deg})),
    explain:tr(`以 1=do 往上数，这个音是简谱 <b>${deg}</b>（${sol[deg]}）。`,`Counting from 1=do, it's <b>${deg}</b> (${sol[deg]}).`)};
};

TEACH.scale=(L)=>`

<p>${tr("大调的两个<b>半音</b>正好落在 <b>3-4</b> 和 <b>7-1</b> 之间，其余都是全音。","The two half-steps fall between 3-4 and 7-1; the rest are whole tones.")}</p>
<div class="row">${timelineHTML({jp:"1 2 3 4 5 6 7 1^",period:4,bpm:120,base:60,tag:tr("大调音阶 · 全全半全全全半","major scale · W W H W W W H")})}</div>
<p>${tr("第一个音 <b>1</b> 叫<b>主音</b>，是这个调的「家」，旋律停在它上面最稳。","The first note <b>1</b> is the <b>tonic</b> — the key's home; melodies rest there.")}</p>
<p>${tr("<b>调</b>就是「1 落在键盘的哪个音」。<b>C 大调</b>（1=C）：从 C 一路按「全全半全全全半」走，<b>正好全是白键</b>——因为键盘上没有黑键的那两处（E-F、B-C）刚好就是大调里那两个半音。","A <b>key</b> = where 1 sits. In <b>C major</b> (1=C), walking W-W-H-W-W-W-H from C lands entirely on <b>white keys</b>, because the keyboard's two natural half-steps (E-F, B-C) line up exactly with the scale's half-steps.")}</p>

<div class="row">${timelineHTML({jp:"1 2 3 4 5 6 7 1^",period:4,bpm:120,base:62,tag:tr("D 大调 · 用到 F♯ C♯ 两个黑键","D major · uses black keys F♯ C♯")})}</div>
<p style="color:var(--muted)">${tr("简谱用<b>首调</b>：不管哪个调，谱面数字 1 2 3 都不变，只在开头标 1=C 或 1=D。（本关只考 C 大调；D 大调在这里只是举例，听个感觉就好。）","Jianpu is movable-do: the numbers never change, only the 1=X mark does. (This level tests only C major; D major here is just a feel-it example.)")}</p>

  :v==="num"?{kind:"choice",concept,qtype:tr("主音","Tonic"),prompt:tr("一段大调旋律，停在简谱<b>哪个音</b>上最「稳、到家」？","A major melody feels most at home resting on which jianpu number?"),options:shuffle([{label:"1 (do)",correct:true},{label:"5 (sol)",correct:false},{label:"7 (si)",correct:false},{label:"4 (fa)",correct:false}]),explain:tr("停在主音 1(do) 最稳、最有到家感。","Resting on 1 (do) feels most resolved.")}
  :{kind:"choice",concept,qtype:tr("主音","Tonic"),prompt:tr("<b>C 大调</b>的主音（1）是哪个音名？","In C major, the tonic (1) is which letter note?"),options:shuffle([{label:"C",correct:true},{label:"G",correct:false},{label:"A",correct:false},{label:"F",correct:false}]),explain:tr("C 大调 1=C，所以主音就是 C。","C major: 1 = C, so the tonic is C.")};

/* ====================== ⑧ 拍子与速度 · 音乐的脉搏 ====================== */

${timelineHTML({jp:"1 2 3 4",period:4,bpm:100,base:60,tag:tr("原速 ♩=100","original ♩=100")})}${timelineHTML({jp:"1 2 3 4",period:4,bpm:150,base:60,tag:tr("变快 ♩=150","faster ♩=150")})}${timelineHTML({jp:"1/e 1/e 2/e 2/e 3/e 3/e 4/e 4/e",period:4,bpm:100,base:60,tag:tr("变密·速度没变 ♩=100","denser · same tempo")})}
<hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
<p>${tr("<b>速度的情绪色彩（复习并展开第⑧关）</b>　谱头的 <b>♩=数字</b> 不只是「快慢」——它直接决定一首歌的<b>情绪</b>。常见速度分档：","<b>Tempo's emotional color (review)</b> — the ♩=number sets the mood, not just speed. Common bands:")}</p>
<p>· <b>${tr("极慢·庄严","very slow")}</b> ♩≈40–60：${tr("肃穆、哀伤、宏大。","solemn, grand.")}<br>
· <b>${tr("慢板·抒情","slow/ballad")}</b> ♩≈60–76：${tr("深情、忧伤、安静（慢情歌、摇篮曲）。","tender, sad, calm.")}<br>
· <b>${tr("行板·中速","andante")}</b> ♩≈76–108：${tr("平稳、叙述、舒适，像散步（大量流行主歌）。","steady, walking.")}<br>
· <b>${tr("快板·欢快","allegro")}</b> ♩≈108–144：${tr("明亮、有动力、想跟着动（舞曲、欢快流行）。","bright, driving.")}<br>
· <b>${tr("急速·热烈","presto")}</b> ♩≈150–200：${tr("激动、紧张、燃（快摇滚、电子、朋克）。","intense, fast.")}</p>
${timelineHTML({jp:"5/e 5/e 6 5 1^ 7 -",period:3,bpm:50,base:60,tag:"♩=50 "+tr("极慢","v.slow")})}${timelineHTML({jp:"5/e 5/e 6 5 1^ 7 -",period:3,bpm:69,base:60,tag:"♩=69 "+tr("抒情","ballad")})}${timelineHTML({jp:"5/e 5/e 6 5 1^ 7 -",period:3,bpm:96,base:60,tag:"♩=96 "+tr("中速","mid")})}${timelineHTML({jp:"5/e 5/e 6 5 1^ 7 -",period:3,bpm:126,base:60,tag:"♩=126 "+tr("欢快","upbeat")})}${timelineHTML({jp:"5/e 5/e 6 5 1^ 7 -",period:3,bpm:168,base:60,tag:"♩=168 "+tr("急速","fast")})}
<p style="color:var(--muted)">${tr("最直观的对比：<b>同一段旋律</b>只改速度，情绪完全不同——慢=深情，中=平稳，快=雀跃：","Same melody, tempo only — slow=tender, mid=steady, fast=joyful:")}</p>
${timelineHTML({jp:"1 2 3 5 | 6 5 3 1",period:4,bpm:63,base:60,tag:tr("同旋律·慢 ♩=63","same · slow ♩=63")})}${timelineHTML({jp:"1 2 3 5 | 6 5 3 1",period:4,bpm:100,base:60,tag:tr("同旋律·中 ♩=100","same · mid ♩=100")})}${timelineHTML({jp:"1 2 3 5 | 6 5 3 1",period:4,bpm:150,base:60,tag:tr("同旋律·快 ♩=150","same · fast ♩=150")})}

QGEN.beat=(concept,L)=>{
  if(concept==="pulse"){ const n=rand([3,4,4,5]);
    return {kind:"ear",concept,qtype:tr("数拍","Count beats"),autoplay:true,
      prompt:rand([tr("跟着脉搏数一数，这里有几个稳定的拍？","Count the steady beats — how many?"),tr("跟着稳定的脉搏点头，一共数到几下？","Nod along to the steady pulse — how many beats?")]),
      play:()=>playBeat(96,n,true),playLabel:tr("再放一次","Replay"),
      options:shuffle([3,4,5,6].map(x=>({label:tr(x+" 拍",x+" beats"),correct:x===n}))),
      explain:tr(`一共 ${n} 个均匀的拍点。先抓住脉搏，再谈节奏。`,`There were ${n} even beats.`)};
  }
  if(concept==="bpm"&&Math.random()<0.5) return {kind:"choice",concept,qtype:"BPM",prompt:tr("BPM（每分钟拍数）<b>越大</b>，歌曲速度会怎样？","Higher BPM means the song is…?"),options:shuffle([{label:tr("越快","Faster"),correct:true},{label:tr("越慢","Slower"),correct:false},{label:tr("越响","Louder"),correct:false},{label:tr("速度不变","No change"),correct:false}]),explain:tr("BPM＝每分钟拍数，数字越大、每拍越密、歌就越快。","BPM = beats per minute; higher = faster.")};
  if(concept==="bpm") return {kind:"choice",concept,qtype:"BPM",
    prompt:rand([tr("「速度 = 120 BPM」是什么意思？","What does '120 BPM' mean?"),tr("谱头写着 ♩=120，指的是什么？","Header says ♩=120 — what does it mean?")]),
    options:shuffle([{label:tr("每分钟有 120 个拍","120 beats per minute"),correct:true},
      {label:tr("一共有 120 个音符","120 notes total"),correct:false},
      {label:tr("一小节有 120 拍","120 beats per bar"),correct:false},
      {label:tr("音高是 120","pitch is 120"),correct:false}]),
    explain:tr("BPM=每分钟的拍数。数字越大越快。同一首歌可以用不同 BPM 弹。","BPM = beats per minute; higher = faster.")};
  if(concept==="tempomood"){ const set=[
      {q:tr("一首深情、忧伤的<b>慢情歌</b>，速度大约在哪一档？","A tender, sad ballad sits at about…?"),a:"♩≈60–76",o:["♩≈60–76","♩≈120–144","♩≈150–200"]},
      {q:tr("一首想让人<b>跟着跳</b>的欢快舞曲，速度大约在？","An upbeat, danceable track is around…?"),a:"♩≈120–144",o:["♩≈120–144","♩≈50–66","♩≈70–80"]}
    ]; const p=rand(set);
    return {kind:"choice",concept,qtype:tr("速度↔情绪","Tempo↔mood"),prompt:p.q,
      options:shuffle(p.o.map(o=>({label:o,correct:o===p.a}))),
      explain:tr("速度直接决定情绪：慢(≈60–76)=深情安静，中(≈76–108)=平稳，快(≈120+)=欢快激动。","Tempo drives mood: slow=tender, mid=steady, fast=excited.")};
  }
  const tempoChanged=Math.random()<0.5;
  return {kind:"ear",concept,qtype:tr("速度≠密度","Tempo≠density"),autoplay:true,
    prompt:rand([tr("先听原版，再听第二遍。第二遍变的是「速度」还是「音符密度」？","Original, then version 2. Did the TEMPO change, or the NOTE DENSITY?"),tr("两遍对比：是脉搏快慢变了，还是一拍里塞的音变多了？","Compare: did the pulse speed change, or the notes-per-beat?")]),
    play:async()=>{ const d=await playMelody([60,62,64,65].map(m=>({m,b:1})),100);
      setTimeout(()=>{ if(tempoChanged) playMelody([60,62,64,65].map(m=>({m,b:1})),160);
        else playMelody([60,60,62,62,64,64,65,65].map(m=>({m,b:.5})),100); }, d*1000+2000); },
    playLabel:tr("再放一次","Replay"),
    options:shuffle([{label:tr("速度变快了（脉搏更密）","Tempo got faster"),correct:tempoChanged},
      {label:tr("音符变密了（速度没变）","More notes, same tempo"),correct:!tempoChanged}]),
    explain:tr(tempoChanged?"脉搏本身变快=速度变了，音还是那 4 个。":"脉搏没变，只是一拍里塞了更多音=密度变了。这两件事常被听混。",tempoChanged?"The pulse sped up = tempo.":"Same pulse, more notes = density.")};
};

<p>${tr("为什么少了 4 和 7 就'有东方味'？因为 3-4 和 7-1 那两个<b>半音</b>被拿掉了，剩下的音之间更宽松、更圆。","Removing 4 and 7 takes away the two half-steps (3-4, 7-1), leaving a rounder, gap-based sound.")}</p>
<p>${tr("最有名的例子就是《茉莉花》，整首只用 1 2 3 5 6：","The classic example is Mo Li Hua (Jasmine) — built entirely on 1 2 3 5 6:")}</p>
<div class="row">${timelineHTML({jp:"3 - 3 5 6 1^ 1^ 6 5 - 5 6 5 -",period:4,bpm:96,base:60,tag:tr("《茉莉花》开头","Mo Li Hua opening")})}</div>
<p>${tr("再听《<b>沧海一声笑</b>》——它的主题是一条<b>下行</b>的五声音阶（6 5 3 2 1…），同样只用 1 2 3 5 6：","Hear also Cang Hai Yi Sheng Xiao — its theme is a descending pentatonic run (6 5 3 2 1…), again only 1 2 3 5 6:")}</p>

/* ====================== ⑨ 大调与小调 · 明亮与忧郁 ====================== */
TEACH.tonality=(L)=>`

· ${tr("从 <b>6(la)</b> 出发 = <b>小调</b>，忧郁、柔软：","From <b>6 (la)</b> = <b>minor</b>, sad:")} ${jpHTML("6_ 7_ 1 2 3 4 5 6")}</p>

/* ====================== ⑨ 升降 Key 与首调 · 数字不变，音高搬家 ====================== */
TEACH.transpose=(L)=>`
<p>${tr("<b>什么叫「首调」？</b>「首」就是<b>主音、起首的那个音</b>。简谱用的是<b>首调唱名</b>：<b>1(do) 永远代表「当前这个调的主音」</b>，而不是某个写死的音。所以在 C 调里 1=C，在 G 调里 1=G——<b>1 是跟着调走的</b>。","<b>What is movable-do (首调)?</b> '首' means the tonic. Jianpu uses <b>movable-do</b>: <b>1 (do) always means the tonic of whatever key you are in</b>, not a fixed pitch. So in C, 1=C; in G, 1=G — <b>do moves with the key</b>.")}</p>
<p>${tr("对比<b>固定调</b>（钢琴、五线谱常用）：那里 do 永远钉死在 C，一换调音名就全变。简谱正相反——<b>谱面数字一个都不动，只换开头那句 1=X</b>。","Contrast <b>fixed-do</b> (piano/staff): do is always C, so the note names all change with the key. Jianpu is the opposite — <b>the numbers never move; only the 1=X mark changes</b>.")}</p>
<div class="row">${timelineHTML({jp:"1 2 3",period:4,bpm:120,base:60,tag:tr("1=C：1 唱 C","1=C → C")})}${timelineHTML({jp:"1 2 3",period:4,bpm:120,base:65,tag:tr("1=F：1 唱 F","1=F → F")})}${timelineHTML({jp:"1 2 3",period:4,bpm:120,base:67,tag:tr("1=G：1 唱 G","1=G → G")})}</div>
<p style="color:var(--muted)">${tr("三个谱面都写「1 2 3」，但「1」分别落在 C / F / G——因为 1 始终是「这个调的 do」。这就是首调。","All three read 1 2 3, but 1 lands on C / F / G — because 1 is always the current key's do. That is movable-do.")}</p>
<p>${tr("正因为简谱是「首调」，换 Key 才这么省事：不管你把整首歌升高还是降低（升降 Key），<b>谱面上的 1 2 3 完全不用改</b>，只改开头那句 <b>1=X</b>。这正是 KTV 遥控器的「升 / 降调」、吉他<b>变调夹(Capo)</b>在做的事。","That\u2019s why changing key is so easy: shift the whole song up/down and the numbers <b>never change</b> — only the <b>1=X</b> mark. That's exactly the KTV key buttons / a guitar capo.")}</p>
${keySliderHTML("1 2 3 5 3 2 1",{bpm:120})}
<p>${tr("呼应第①关「音域」：歌太高唱不上去，就整体<b>降 Key</b>；太低就升。台阶关系没变，只是整体挪了位置。","Echoes Level ① (range): too high to sing → drop the key; too low → raise it. The steps don't change, the whole thing just moves.")}</p>
<details class="note xopen" data-tag="${tr("男女同唱","octave")}"><summary>${tr("男声女声的八度错觉","Male/female octave illusion")}</summary>
<p style="color:var(--muted)">${tr("流行歌谱通常只写一份简谱。男生和女生唱同一个 1(do)，男生实际通常<b>低一个八度</b>——听起来一高一低，但简谱记法完全一样。这就是「跟原唱总觉得高不上去/低不下来」的原因之一。","One score; men usually sing it an octave lower than women — same numbers, different actual octave.")}</p>
<div class="row">${timelineHTML({jp:"1 2 3 4 5",period:4,bpm:120,base:72,tag:tr("女声音区","higher")})}${timelineHTML({jp:"1 2 3 4 5",period:4,bpm:120,base:60,tag:tr("男声(低八度)","lower 8ve")})}</div></details>`;
QGEN.transpose=(concept,L)=>{
  if(concept==="movable"){ const v=Math.random()<0.34;
    if(v) return {kind:"choice",concept,qtype:tr("首调","Movable do"),
      prompt:rand([tr("把整首歌升高 key（变高），简谱上的数字要跟着改吗？","Raise the key — do the jianpu numbers change?"),tr("整首歌升 Key 之后，简谱的数字 1 2 3 需要改吗？","After raising the key, do jianpu numbers 1 2 3 change?")]),
      options:shuffle([{label:tr("不用改，只改开头的 1=X","No — only the 1=X mark changes"),correct:true},{label:tr("每个数字都要加 1","Add 1 to every number"),correct:false},{label:tr("全部要加升号 ♯","Add ♯ to everything"),correct:false},{label:tr("要重新写一份谱","Rewrite the whole score"),correct:false}]),
      explain:tr("简谱是首调：升降 key 只改 1=X（1 落在哪个音），谱面 1 2 3 一个都不动。","Movable-do: only 1=X changes; the numbers stay.")};
    const set=[["C","升高一个全音（do→re）","up a whole tone","D"],["D","升高一个全音","up a whole tone","E"],["F","升高一个全音","up a whole tone","G"],["G","升高一个全音","up a whole tone","A"],["A","升高一个全音","up a whole tone","B"],["D","降低一个全音（re→do）","down a whole tone","C"],["E","降低一个全音","down a whole tone","D"],["G","降低一个全音","down a whole tone","F"],["B","降低一个全音","down a whole tone","A"],["C","升高一个纯五度（do→sol）","up a perfect 5th","G"],["G","升高一个纯五度","up a perfect 5th","D"],["F","升高一个纯五度","up a perfect 5th","C"],["C","升高一个纯四度（do→fa）","up a perfect 4th","F"],["C","升高半音（do→升do）","up a semitone","#C"],["F","升高半音","up a semitone","#F"],["G","升高半音","up a semitone","#G"]];
    const p=rand(set); const pool=["C","D","E","F","G","A","B","#C","#F","#G"];
    return {kind:"choice",concept,qtype:tr("升降调改谱头","Transpose the header"),
      prompt:tr("谱头原本是 <b>1="+p[0]+"</b>。把整首歌<b>"+p[1]+"</b>，谱头应改成？","Header is <b>1="+p[0]+"</b>. Transpose the whole song <b>"+p[2]+"</b> — the new header should be?"),
      options:shuffle([{label:"1="+p[3],correct:true},{label:"1="+p[0],sub:tr("没移调=没变","unchanged"),correct:false},...shuffle(pool.filter(x=>x!==p[3]&&x!==p[0])).slice(0,2).map(x=>({label:"1="+x,correct:false}))]),
      explain:tr("「"+p[1]+"」＝把主音 1 从 "+p[0]+" 移到 "+p[3]+"，所以谱头改成 <b>1="+p[3]+"</b>；谱面数字一个都不动（首调）。","Transposing "+p[2]+": 1 moves "+p[0]+"→"+p[3]+", so the header becomes <b>1="+p[3]+"</b>; the numbers stay the same.")};
  }
  if(concept==="capo"){ const v=rand(["capo","ktv","high","low"]);
    if(v==="capo") return {kind:"choice",concept,qtype:tr("变调夹","Capo"),
      prompt:tr("吉他<b>变调夹</b>的作用是？","What does a guitar <b>capo</b> do?"),
      options:shuffle([{label:tr("把整首歌平移到另一个 Key（音高一起移、指法和简谱数字不变）","Shifts the whole song to another key; shape & numbers unchanged"),correct:true},{label:tr("让歌变快","Makes the song faster"),correct:false},{label:tr("只升高最高那个音","Only raises the highest note"),correct:false},{label:tr("改变节奏型","Changes the rhythm"),correct:false}]),
      explain:tr("变调夹＝整体移调：所有音一起升高，旋律形状和相对台阶完全不变。","A capo transposes everything up together; the shape stays the same.")};
    if(v==="ktv") return {kind:"choice",concept,qtype:tr("升降调按钮","Key buttons"),
      prompt:tr("KTV / 全民K歌 里的「<b>升调 / 降调</b>」按钮，作用是？","What do the <b>key up / down</b> buttons in KTV / karaoke apps do?"),
      options:shuffle([{label:tr("把整首伴奏和旋律一起移高或移低（移调）","Move the whole backing + melody up or down — transpose"),correct:true},{label:tr("调大或调小音量","Change the volume"),correct:false},{label:tr("加快或减慢速度","Change the tempo"),correct:false},{label:tr("只改变副歌部分","Only change the chorus"),correct:false}]),
      explain:tr("升 / 降调按钮＝整体移调，把歌挪到你唱着舒服的音域；简谱数字关系不变。","Key buttons transpose the whole song into a range you can sing comfortably.")};
    if(v==="high") return {kind:"choice",concept,qtype:tr("怎么选调","Choosing a key"),
      prompt:tr("一首歌<b>最高音太高、唱不上去</b>，但最低音唱起来很轻松。该怎么办？","A song's highest notes are too high to sing, while the low ones are easy — what should you do?"),
      options:shuffle([{label:tr("整首<b>降调</b>（往低移）","Transpose the whole song DOWN"),correct:true},{label:tr("整首升调（往高移）","Transpose it UP"),correct:false},{label:tr("只把高音改低，其余不动","Lower just the high notes"),correct:false},{label:tr("唱快一点","Sing it faster"),correct:false}]),
      explain:tr("高音够不着＝整体偏高，<b>降调</b>把全曲移低，高音就够得着了（低音本来轻松，降一点也还有余量）。","Highs unreachable → transpose DOWN so they come into range.")};
    return {kind:"choice",concept,qtype:tr("怎么选调","Choosing a key"),
      prompt:tr("一首歌<b>最低音太低、下不去</b>，但最高音唱起来很轻松。该怎么办？","A song's lowest notes are too low to reach, while the high ones are easy — what should you do?"),
      options:shuffle([{label:tr("整首<b>升调</b>（往高移）","Transpose the whole song UP"),correct:true},{label:tr("整首降调（往低移）","Transpose it DOWN"),correct:false},{label:tr("只把低音改高，其余不动","Raise just the low notes"),correct:false},{label:tr("唱慢一点","Sing it slower"),correct:false}]),
      explain:tr("低音下不去＝整体偏低，<b>升调</b>把全曲移高，低音就够得到了（高音本来轻松，升一点也还有余量）。","Lows unreachable → transpose UP so they come into range.")};
  }
  const up=Math.random()<0.5; const amt=3+Math.floor(Math.random()*5); const shift=up?amt:-amt;
  return {kind:"ear",concept,qtype:tr("升调还是降调","Up or down?"),autoplay:true,
    prompt:rand([tr("同一句 <b>1 2 3 5</b>，第二遍换了个 Key。它是<b>升调</b>了还是<b>降调</b>了？","Same 1 2 3 5, second time in a new key — did it go UP or DOWN?"),tr("先听原版，再听移调版：第二遍整体是<b>变高（升调）</b>还是<b>变低（降调）</b>？","Original then transposed — is the 2nd higher (up) or lower (down)?")]),
    play:async()=>{ await playMelody(jpMidis("1 2 3 5",60).map(m=>({m,b:.5})),130); setTimeout(()=>playMelody(jpMidis("1 2 3 5",60+shift).map(m=>({m,b:.5})),130),1200); },
    playLabel:tr("再放一次","Replay"),
    options:shuffle([{label:tr("升调了——整体变高","Up — higher overall"),correct:up},{label:tr("降调了——整体变低","Down — lower overall"),correct:!up}]),
    explain:tr(up?"第二遍整体音高<b>升高</b>了（升调）；但数字 1 2 3 5 和旋律形状完全没变——这就是移调。":"第二遍整体音高<b>降低</b>了（降调）；但数字 1 2 3 5 和旋律形状完全没变——这就是移调。",up?"The 2nd is higher — transposed UP; numbers and shape unchanged.":"The 2nd is lower — transposed DOWN; numbers and shape unchanged.")};
};

/* ====================== ⑰ 三连音 · 一拍塞进三个 ====================== */
TEACH.triplet=(L)=>`
<p>${tr("平时一拍常「一分为二」（两个八分：哒-哒）。<b>三连音</b>是把一拍<b>平均分成 3 个</b>（哒-哒-哒），打破偶数感，带来一种<b>滚动/摇曳</b>的感觉，R&B、抒情过渡段很爱用。","Usually a beat splits in 2 (两 eighths). A <b>triplet</b> splits it into <b>3</b> even notes — a rolling feel, loved in R&B/ballad fills.")}</p>
<div class="row">${timelineHTML({mel:"60:0.5 60:0.5 62:0.5 62:0.5",period:2,bpm:96,base:60,tag:tr("两等分·一拍2个（哒哒）","duple: 2 per beat")})}${timelineHTML({mel:"60:0.3333 60:0.3333 60:0.3333 62:0.3333 62:0.3333 62:0.3333",period:2,bpm:96,base:60,tag:tr("三连音·一拍3个（哒哒哒）","triplet: 3 per beat")})}</div>
<p style="color:var(--muted)">${tr("简谱里：三个音<b>下面画连线</b>、<b>上面标一个 3</b>，就是三连音：","In jianpu: three notes with an underline and a 3 above = a triplet:")}</p>
<div style="margin:8px 0"><span class="tripfig"><span class="tripbk"><svg viewBox="0 0 100 16" preserveAspectRatio="none"><path d="M3 15 Q3 4 42 4" fill="none" stroke="var(--p3)" stroke-width="2"/><path d="M58 4 Q97 4 97 15" fill="none" stroke="var(--p3)" stroke-width="2"/></svg></span><span class="trip3">3</span>${jpHTML("1/e 1/e 1/e")}</span>　${jpHTML("5")}　<span class="tripfig"><span class="tripbk"><svg viewBox="0 0 100 16" preserveAspectRatio="none"><path d="M3 15 Q3 4 42 4" fill="none" stroke="var(--p3)" stroke-width="2"/><path d="M58 4 Q97 4 97 15" fill="none" stroke="var(--p3)" stroke-width="2"/></svg></span><span class="trip3">3</span>${jpHTML("3/e 3/e 3/e")}</span></div>`;
QGEN.triplet=(concept,L)=>{ if(concept==="feel"&&Math.random()<0.5) return {kind:"choice",concept,qtype:tr("三连音","Triplet"),prompt:tr("三连音上方通常标一个什么<b>数字</b>来提示？","A triplet is usually marked with which small number?"),options:shuffle([{label:"3",correct:true},{label:"2",correct:false},{label:"6",correct:false},{label:tr("不用标","nothing"),correct:false}]),explain:tr("三连音常在三个音上方标一个「3」，提示这一拍分成了 3 个。","A small 3 marks the three-in-one-beat group.")};
  if(concept==="what"&&Math.random()<0.5) return {kind:"choice",concept,qtype:tr("三连音","Triplet"),prompt:tr("一个三连音的 3 个音，一共占<b>几拍</b>？","The 3 notes of a triplet take up how many beats in total?"),options:shuffle([{label:tr("1 拍（均分一拍）","1 beat"),correct:true},{label:tr("3 拍","3 beats"),correct:false},{label:tr("半拍","Half a beat"),correct:false},{label:tr("2 拍","2 beats"),correct:false}]),explain:tr("三连音＝把<b>一拍</b>平均分成 3 个，三个音合起来正好 1 拍。","A triplet splits ONE beat into 3 even notes — together they fill 1 beat.")};
  if(concept==="what") return {kind:"choice",concept,qtype:tr("三连音","Triplet"),
    prompt:rand([tr("三连音是把一拍怎么分？","A triplet divides one beat how?"),tr("三连音把一拍平均分成几个音？","A triplet splits one beat into how many even notes?")]),
    options:shuffle([{label:tr("平均分成 3 个音","into 3 equal notes"),correct:true},
      {label:tr("平均分成 2 个音","into 2"),correct:false},{label:tr("分成 4 个音","into 4"),correct:false},
      {label:tr("延长成 3 拍","stretched to 3 beats"),correct:false}]),
    explain:tr("三连音 = 一拍里平均塞 3 个音（而不是 2 个）。","Triplet = 3 even notes in one beat.")};
  if(concept==="ear"){ const trip=Math.random()<0.5;
    return {kind:"ear",concept,qtype:tr("2 还是 3","2 or 3"),autoplay:true,
      prompt:rand([tr("听这一拍里，是平均 2 个音，还是 3 个音？","2 even notes per beat, or 3?"),tr("这一拍被平均分成了几个音——2 个还是 3 个？","How many even notes fill this beat — 2 or 3?")]),
      play:()=>playMelody((trip?[60,60,60,60,60,60]:[60,60,60,60]).map(m=>({m,b:trip?1/3:.5})),96),playLabel:tr("再放一次","Replay"),
      options:shuffle([{label:tr("3 个（三连音）","3 (triplet)"),correct:trip},{label:tr("2 个（八分）","2 (eighths)"),correct:!trip}]),
      explain:tr(trip?"一拍 3 个 = 三连音，滚动感。":"一拍 2 个 = 普通八分。",trip?"3 per beat = triplet.":"2 per beat = eighths.")};
  }
  return {kind:"choice",concept,qtype:tr("感觉","Feel"),
    prompt:rand([tr("三连音常带来什么感觉？","Triplets often feel…?"),tr("一拍三连的节奏，通常给人什么律动感？","A three-per-beat rhythm usually gives what feel?")]),
    options:shuffle([{label:tr("滚动、摇曳的三分感","rolling, lilting"),correct:true},
      {label:tr("方正、进行曲感","square, march-like"),correct:false},{label:tr("完全停止","stopped"),correct:false}]),
    explain:tr("三等分打破偶数方正感，听起来滚动/摇曳，R&B 与抒情常用。","Threes feel rolling — common in R&B/ballads.")};
};

/* ====================== ⑱ 摇摆律动 · 平直 vs 弹跳 ====================== */
TEACH.swing=(L)=>`
<p>${tr("同样写成八分音符，弹法有两种感觉：<b>平直(Straight)</b>=两个八分一样长（哒-哒）；<b>摇摆(Swing)</b>=把前一个<b>拉长</b>、后一个<b>缩短</b>（哒——哒），产生<b>弹跳/慵懒</b>的律动，爵士、布鲁斯、老摇滚的灵魂。","Same eighths, two feels: <b>straight</b> (even) vs <b>swing</b> (long-short, bouncy) — the soul of jazz/blues.")}</p>
<div class="row">
  ${timelineHTML({mel:"60:.5 62:.5 64:.5 65:.5 67:.5 65:.5 64:.5 62:.5",period:4,bpm:110,base:60,tag:tr("平直","straight")})}
  ${timelineHTML({mel:"60:.66 62:.34 64:.66 65:.34 67:.66 65:.34 64:.66 62:.34",period:4,bpm:110,base:60,tag:tr("摇摆(长短)","swing")})}
</div>
<p style="color:var(--muted)">${tr("不用记复杂比例，只要记：摇摆 = 前长后短的弹跳感。","No ratios needed — swing = long-then-short bounce.")}</p>
<p style="color:var(--muted)">${tr("<b>唱歌时也一样</b>：把字的长短稍微做点变化（前一个字唱长一点、后一个短一点，不必死板均分），就能给旋律添一点摇摆、律动感。","When singing too: slightly vary the syllable lengths (a touch longer then shorter, not rigidly even) for the same lilting groove.")}</p>`;
QGEN.swing=(concept,L)=>{
  if(concept==="what"&&Math.random()<0.5) return {kind:"choice",concept,qtype:tr("摇摆","Swing"),prompt:tr("<b>平直（straight）</b>的一对八分音符，长短比例大约是？","Two STRAIGHT eighth notes have roughly what long-short ratio?"),options:shuffle([{label:tr("1:1（一样长）","1:1 (equal)"),correct:true},{label:tr("2:1（前长后短）","2:1"),correct:false},{label:tr("1:2（前短后长）","1:2"),correct:false},{label:tr("3:1","3:1"),correct:false}]),explain:tr("平直＝两个八分一样长（1:1）；摇摆 swing 才是前长后短（约 2:1）。","Straight = 1:1; swing = long-short (~2:1).")};
  if(concept==="what") return {kind:"choice",concept,qtype:tr("摇摆","Swing"),
    prompt:rand([tr("摇摆(swing)是怎么处理一对八分音符的？","How does swing treat a pair of eighths?"),tr("摇摆(swing)把一对八分音符弹成怎样的长短？","Swing turns a pair of eighths into what long-short feel?")]),
    options:shuffle([{label:tr("前一个拉长、后一个缩短（长短）","long then short"),correct:true},
      {label:tr("两个一样长（平直）","both equal"),correct:false},
      {label:tr("两个都缩短","both shorter"),correct:false},
      {label:tr("加快速度","speed up"),correct:false}]),
    explain:tr("摇摆 = 长-短-长-短的弹跳；平直 = 均分。","Swing = long-short bounce; straight = even.")};
  const sw=Math.random()<0.5;
  return {kind:"ear",concept,qtype:tr("平直/摇摆","Straight/swing"),autoplay:true,
    prompt:rand([tr("听这一段《玛丽的小羊》，是平直还是摇摆？","Mary's lamb — straight or swing?"),tr("这段《玛丽的小羊》的八分音符，是平均（平直）还是长短（摇摆）？","Are the eighths even (straight) or long-short (swing)?")]),
    play:()=>{ const seq=[64,62,60,62,64,64,64].map((m,i)=>({m,b: sw?(i%2===0?.62:.38):.5})); playMelody(seq,120); },
    playLabel:tr("再放一次","Replay"),
    options:shuffle([{label:tr("摇摆（弹跳长短）","Swing"),correct:sw},{label:tr("平直（均匀）","Straight"),correct:!sw}]),
    explain:tr(sw?"长短长短的弹跳 = 摇摆。":"均匀平稳 = 平直。",sw?"Bouncy long-short = swing.":"Even = straight.")};
};

/* ====================== ㉑ 装饰音与转音 · 为什么原唱更丰富 ====================== */
TEACH.ornament=(L)=>`
<p>${tr("谱子看起来简单，原唱却很丰富，秘密常在<b>装饰</b>：","Plain score, rich vocal — the secret is often ornaments:")}</p>
